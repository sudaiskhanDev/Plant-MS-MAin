<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">

         <style>/* ==============================================
   PLANT CRUD PAGE - STYLES (Sidebar untouched)
   Modern green theme, glassmorphism, smooth UX
================================================= */

/* ----- CRUD CONTAINER (within dashboard-content) ----- */
.dashboard-content {
    padding: 1.5rem 2rem;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 32px;
    backdrop-filter: blur(4px);
    animation: fadeSlideUp 0.4s ease-out;
}

.dashboard-content h2 {
    font-size: 2rem;
    font-weight: 600;
    color: var(--primary-green, #2e7d32);
    margin-bottom: 1.5rem;
    display: inline-block;
    border-left: 5px solid var(--accent-leaf, #6b8c42);
    padding-left: 1rem;
}

/* ----- FORM SECTIONS (Create & Update) ----- */
.form-section {
    background: white;
    border-radius: 28px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    box-shadow: var(--shadow-md, 0 8px 20px rgba(0, 0, 0, 0.08));
    transition: transform 0.3s, box-shadow 0.3s;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: flex-end;
}

.form-section:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg, 0 12px 28px rgba(0, 0, 0, 0.12));
}

/* Inputs, selects, file */
.form-section input,
.form-section select,
.form-section input[type="file"] {
    flex: 1 1 180px;
    padding: 12px 16px;
    border: 1px solid #d0e2c0;
    border-radius: 40px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    background: #fefef7;
    transition: all 0.2s;
}

.form-section input:focus,
.form-section select:focus {
    outline: none;
    border-color: var(--primary-green, #2e7d32);
    box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
}

/* Buttons inside forms */
.form-section button {
    background: linear-gradient(135deg, var(--primary-green, #2e7d32), var(--primary-dark, #1b5e20));
    border: none;
    color: white;
    padding: 12px 28px;
    border-radius: 40px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: var(--shadow-sm, 0 2px 6px rgba(0,0,0,0.1));
}

.form-section button:hover {
    transform: scale(1.02);
    background: linear-gradient(135deg, var(--primary-dark, #1b5e20), #0f3b0f);
    box-shadow: var(--shadow-md, 0 6px 14px rgba(0,0,0,0.15));
}

/* Horizontal ruler */
hr {
    margin: 2rem 0;
    border: none;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--primary-light, #c8e6c9), transparent);
}

/* ----- PLANT LIST (GRID) ----- */
#plantList {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2rem;
    margin-top: 1rem;
}

/* Plant Card */
.plant-card {
    background: white;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: var(--shadow-sm, 0 4px 12px rgba(0,0,0,0.05));
    transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(107, 140, 66, 0.2);
}

.plant-card:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow-lg, 0 20px 30px -10px rgba(0,0,0,0.15));
}

/* Image area */
.plant-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    transition: transform 0.5s;
}

.plant-card:hover img {
    transform: scale(1.03);
}

/* Card content */
.plant-card h3 {
    font-size: 1.4rem;
    margin: 1rem 1rem 0.2rem;
    color: var(--primary-dark, #1b5e20);
}

.plant-card .price {
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--accent-leaf, #6b8c42);
    margin: 0 1rem 0.3rem;
}

.plant-card p {
    margin: 0.3rem 1rem;
    color: var(--text-muted, #4a5b4a);
    line-height: 1.4;
}

/* Card actions (edit/delete buttons) */
.card-actions {
    display: flex;
    gap: 12px;
    padding: 1rem;
    margin-top: auto;
    border-top: 1px solid #eef3e8;
}

.btn-edit, .btn-delete {
    flex: 1;
    padding: 10px 0;
    border: none;
    border-radius: 40px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
}

.btn-edit {
    background: #e8f5e9;
    color: var(--primary-green, #2e7d32);
}

.btn-edit:hover {
    background: var(--primary-green, #2e7d32);
    color: white;
    transform: scale(1.02);
}

.btn-delete {
    background: #ffefef;
    color: #c62828;
}

.btn-delete:hover {
    background: #c62828;
    color: white;
    transform: scale(1.02);
}

/* ----- RESPONSIVE FOR CRUD (mobile) ----- */
@media (max-width: 768px) {
    .dashboard-content {
        padding: 1rem;
    }

    .form-section {
        flex-direction: column;
        align-items: stretch;
    }

    .form-section input,
    .form-section select,
    .form-section button {
        width: 100%;
    }

    #plantList {
        grid-template-columns: 1fr;
    }
}

/* Animation */
@keyframes fadeSlideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}</style>

    <title>Plant CRUD</title>
</head>
<body>

<div class="main-admin-dashboard">

    <!-- SIDEBAR -->
    <div class="side-bar">
        <h1>Admin Dashboard</h1>

        <div class="pages-links">
                <ul>
                    <a href="../Admin Dashboard.html">Dashboard</a>
                     <a href="./App Plants.html">Add Plants</a>
                     <a href="./Category.html">Categories</a>
                    <a href="./Users.html">Users</a>
                    <a href="./Orders.html">Orders</a>
                    <a href="./Order Details.html">Order Details</a>
                    <a href="./Payment.html">Payment</a>
                    <a href="./Maintenance.html">Maintenance</a>
                    <a href="./Supplier.html">Supplier</a>
                    <a href="./supplier_order.html">Supplier Order</a>
                    <a href="./Notification.html">Notification</a>
                    <a href="./Report.html">Report</a>
                    
                   
                    
                </ul>
            </div>
    </div>

    <!-- DASHBOARD CONTENT -->
    <div class="dashboard-content">

        <h2>Plant CRUD</h2>

        <!-- CREATE -->
        <div class="form-section">
            <input type="text" id="name" placeholder="Plant Name">
            <input type="number" id="price" placeholder="Price">
            <input type="number" id="stock" placeholder="Stock">
            <input type="text" id="description" placeholder="Description">
            <select id="category_id"></select>
            <input type="file" id="image">
            <button onclick="addPlant()">Add Plant</button>
        </div>

        <hr>

        <!-- UPDATE -->
        <div class="form-section" style="background: #f0f4f0;">
            <input type="hidden" id="edit_id">
            <input type="text" id="edit_name" placeholder="Edit Name">
            <input type="number" id="edit_price" placeholder="Edit Price">
            <input type="number" id="edit_stock" placeholder="Edit Stock">
            <input type="text" id="edit_description" placeholder="Edit Description">
            <select id="edit_category"></select>
            <input type="file" id="edit_image">
            <button onclick="updatePlant()">Update Plant</button>
        </div>

        <hr>

        <!-- LIST -->
        <div id="plantList"></div>

    </div>

</div>

<script >

    const API = "http://127.0.0.1:8000/api/plants";
const CAT_API = "http://127.0.0.1:8000/api/categories";
const token = localStorage.getItem("token");

loadPlants();
loadCategories();

/* -------------------------
   LOAD CATEGORIES
--------------------------*/
async function loadCategories() {

    const res = await fetch(CAT_API);
    const data = await res.json();

    let select = document.getElementById("category_id");
    let editSelect = document.getElementById("edit_category");

    select.innerHTML = "";
    editSelect.innerHTML = "";

    data.forEach(cat => {

        let option1 = document.createElement("option");
        option1.value = cat.category_id;
        option1.textContent = cat.category_name;

        let option2 = option1.cloneNode(true);

        select.appendChild(option1);
        editSelect.appendChild(option2);
    });
}

/* -------------------------
   LOAD PLANTS
--------------------------*/
async function loadPlants() {

    const res = await fetch(API);
    const data = await res.json();

    const list = document.getElementById("plantList");
    list.innerHTML = "";

    data.forEach(p => {

        const box = document.createElement("div");
        box.className = "plant-card";

        let imgHtml = p.image 
            ? `<img src="http://127.0.0.1:8000/storage/${p.image}" alt="${p.name}">` 
            : `<div style="height:200px; background:#eee; border-radius:12px; display:flex; align-items:center; justify-content:center;">No Image</div>`;

        box.innerHTML = `
            ${imgHtml}
            <h3>${p.name}</h3>
            <p class="price">$${p.price}</p>
            <p><small>Stock: ${p.stock_quantity} | ${p.category?.category_name || 'Uncategorized'}</small></p>
            <p style="font-size:0.85rem; color:#666;">${p.description}</p>
            <div class="card-actions"></div>
        `;

        let editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.className = "btn-edit";
        editBtn.onclick = () => fillEdit(p);

        let delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.className = "btn-delete";
        delBtn.onclick = () => deletePlant(p.plant_id);

        box.querySelector('.card-actions').appendChild(editBtn);
        box.querySelector('.card-actions').appendChild(delBtn);

        list.appendChild(box);
    });
}

/* -------------------------
   ADD PLANT
--------------------------*/
async function addPlant() {

    const formData = new FormData();

    formData.append("name", document.getElementById("name").value);
    formData.append("price", document.getElementById("price").value);
    formData.append("stock_quantity", document.getElementById("stock").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("category_id", document.getElementById("category_id").value);

    const image = document.getElementById("image").files[0];
    if (image) formData.append("image", image);

    await fetch(API, {
        method: "POST",
        body: formData
    });

    loadPlants();
}

/* -------------------------
   FILL EDIT
--------------------------*/
function fillEdit(p) {

    document.getElementById("edit_id").value = p.plant_id;
    document.getElementById("edit_name").value = p.name;
    document.getElementById("edit_price").value = p.price;
    document.getElementById("edit_stock").value = p.stock_quantity;
    document.getElementById("edit_description").value = p.description;
    document.getElementById("edit_category").value = p.category_id;
}

/* -------------------------
   UPDATE PLANT
--------------------------*/
async function updatePlant() {

    const id = document.getElementById("edit_id").value;

    const formData = new FormData();

    formData.append("name", document.getElementById("edit_name").value);
    formData.append("price", document.getElementById("edit_price").value);
    formData.append("stock_quantity", document.getElementById("edit_stock").value);
    formData.append("description", document.getElementById("edit_description").value);
    formData.append("category_id", document.getElementById("edit_category").value);

    const image = document.getElementById("edit_image").files[0];
    if (image) formData.append("image", image);

    await fetch(`${API}/${id}`, {
        method: "POST",
        headers: {
            "X-HTTP-Method-Override": "PUT"
        },
        body: formData
    });

    loadPlants();
}

/* -------------------------
   DELETE
--------------------------*/
async function deletePlant(id) {

    await fetch(`${API}/${id}`, {
        method: "DELETE"
    });

    loadPlants();
}
</script>

</body>
</html>
