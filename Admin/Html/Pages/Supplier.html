<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">
    <title>Admin Dashboard - Suppliers</title>

    <style>
        /* ==============================================
   SUPPLIER MANAGEMENT (Sidebar untouched)
   Modern green theme, glassmorphism, responsive table
================================================= */

/* ----- MAIN CONTENT AREA (glassmorphism) ----- */
.dashboard-content {
    flex: 1;
    margin: 1rem 2rem 2rem 1rem;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);
    border-radius: 36px;
    padding: 2rem;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    animation: fadeSlideUp 0.4s ease;
    overflow-x: auto;
}

.dashboard-content h2 {
    font-size: 2rem;
    font-weight: 600;
    color: #2e7d32;
    margin-bottom: 1.8rem;
    border-left: 5px solid #6b8c42;
    padding-left: 1rem;
    display: inline-block;
}

/* ----- FORM SECTION (Create/Update) ----- */
.dashboard-content > div:first-of-type {
    background: white;
    border-radius: 28px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
    transition: transform 0.2s, box-shadow 0.2s;
}

.dashboard-content > div:first-of-type:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
}

.dashboard-content h3 {
    font-size: 1.3rem;
    font-weight: 500;
    color: #1b5e20;
    margin-bottom: 1.2rem;
    border-left: 3px solid #6b8c42;
    padding-left: 0.8rem;
}

/* Form layout – flex wrap */
.dashboard-content > div:first-of-type {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: flex-end;
}

.dashboard-content input {
    flex: 1 1 200px;
    padding: 12px 16px;
    border: 1px solid #d0e2c0;
    border-radius: 48px;
    font-size: 0.9rem;
    font-family: inherit;
    background: #fefef7;
    transition: all 0.2s;
}

.dashboard-content input:focus {
    outline: none;
    border-color: #2e7d32;
    box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.15);
    background: white;
}

.dashboard-content input::placeholder {
    color: #9bbf8f;
}

/* Add / Save button */
.dashboard-content button {
    background: linear-gradient(135deg, #2e7d32, #1b5e20);
    border: none;
    color: white;
    padding: 12px 28px;
    border-radius: 48px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.dashboard-content button:hover {
    transform: scale(1.02);
    background: linear-gradient(135deg, #1b5e20, #0f3b0f);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
}

/* Horizontal rule */
hr {
    margin: 2rem 0;
    border: none;
    height: 2px;
    background: linear-gradient(90deg, transparent, #c8e6c9, transparent);
}

/* ----- TABLE STYLES ----- */
.dashboard-content table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
}

.dashboard-content thead tr {
    background: linear-gradient(135deg, #2e7d32, #1b5e20);
    color: white;
}

.dashboard-content th {
    padding: 14px 12px;
    font-weight: 600;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
}

.dashboard-content td {
    padding: 12px 8px;
    border-bottom: 1px solid #eef3e8;
    text-align: center;
    vertical-align: middle;
    font-size: 0.9rem;
    color: #1f2a1f;
}

/* Row striping & hover */
.dashboard-content tbody tr:nth-child(even) {
    background-color: #fafefa;
}
.dashboard-content tbody tr:hover {
    background: #f5fbf0;
    transition: 0.2s;
}

/* Action buttons (Edit / Delete) */
.dashboard-content td:last-child button {
    padding: 6px 16px;
    border: none;
    border-radius: 40px;
    font-weight: 500;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    margin: 0 4px;
    font-family: inherit;
}

/* Edit button */
.dashboard-content td:last-child button:first-child {
    background: #e8f5e9;
    color: #2e7d32;
}
.dashboard-content td:last-child button:first-child:hover {
    background: #2e7d32;
    color: white;
    transform: translateY(-1px);
}

/* Delete button */
.dashboard-content td:last-child button:last-child {
    background: #ffefef;
    color: #c62828;
}
.dashboard-content td:last-child button:last-child:hover {
    background: #c62828;
    color: white;
    transform: translateY(-1px);
}

/* ----- RESPONSIVE (mobile) ----- */
@media (max-width: 850px) {
    .dashboard-content {
        margin: 1rem;
        padding: 1.2rem;
    }
    .dashboard-content > div:first-of-type {
        flex-direction: column;
        align-items: stretch;
    }
    .dashboard-content input,
    .dashboard-content button {
        width: 100%;
    }
    .dashboard-content table {
        min-width: 600px;
    }
    .dashboard-content th,
    .dashboard-content td {
        padding: 10px 6px;
        font-size: 0.8rem;
    }
}

@media (max-width: 520px) {
    .dashboard-content h2 {
        font-size: 1.5rem;
    }
    .dashboard-content h3 {
        font-size: 1.1rem;
    }
}

/* ----- ANIMATION ----- */
@keyframes fadeSlideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
</head>
<body>

<div class="main-admin-dashboard">

   <!-- SIDEBAR -->
    <div class="side-bar">
        <h1>Admin Dashboard</h1>

        <div class="pages-links">
                <ul>
                    <a href="../Admin Dashboard.html">Dashboard</a>
                     <a href="./App Plants.html">Add Plants</a>
                     <a href="./Category.html">Categories</a>
                     <a href="./Inventory.html">Inventory</a>
                    <a href="./Users.html">Users</a>
                    <a href="./Orders.html">Orders</a>
                    <a href="./Order Details.html">Order Details</a>
                    <a href="./Payment.html">Payment</a>
                    <a href="./Maintenance.html">Maintenance</a>
                    <a href="./Supplier.html">Supplier</a>
                    <a href="./supplier_order.html">Supplier Order</a>
                    <a href="./Notification.html">Notification</a>
                    <a href="./Report.html">Report</a>
                    
                   
                    
                </ul>
            </div>
    </div>

    <!-- DASHBOARD CONTENT -->
    <div class="dashboard-content">

        <h2>Supplier Management</h2>

        <!-- CREATE FORM -->
        <div>
            <h3>Add Supplier</h3>

            <input type="text" id="name" placeholder="Supplier Name">
            <input type="text" id="contact" placeholder="Contact">
            <input type="text" id="address" placeholder="Address">

            <button onclick="createSupplier()">Add Supplier</button>
        </div>

        <hr>

        <!-- TABLE -->
        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Contact</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="supplierTable"></tbody>
        </table>

    </div>

</div>

<script>

const API_URL = "http://localhost:8000/api/suppliers";

// 📥 READ
function loadSuppliers() {
    fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            let rows = "";

            data.forEach(supplier => {
                rows += `
                <tr>
                    <td>${supplier.supplier_id}</td>
                    <td>${supplier.name}</td>
                    <td>${supplier.contact}</td>
                    <td>${supplier.address}</td>
                    <td>
                        <button onclick="editSupplier(${supplier.supplier_id}, '${supplier.name}', '${supplier.contact}', '${supplier.address}')">Edit</button>
                        <button onclick="deleteSupplier(${supplier.supplier_id})">Delete</button>
                    </td>
                </tr>`;
            });

            document.getElementById("supplierTable").innerHTML = rows;
        });
}


// ➕ CREATE / UPDATE SWITCH
let editMode = false;
let editId = null;

function createSupplier() {

    let data = {
        name: document.getElementById("name").value,
        contact: document.getElementById("contact").value,
        address: document.getElementById("address").value
    };

    if (editMode) {
        // ✏️ UPDATE
        fetch(`${API_URL}/${editId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(() => {
            editMode = false;
            editId = null;
            clearForm();
            loadSuppliers();
        });

    } else {
        // ➕ CREATE
        fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(() => {
            clearForm();
            loadSuppliers();
        });
    }
}


// ✏️ EDIT
function editSupplier(id, name, contact, address) {
    document.getElementById("name").value = name;
    document.getElementById("contact").value = contact;
    document.getElementById("address").value = address;

    editMode = true;
    editId = id;
}


// ❌ DELETE
function deleteSupplier(id) {
    fetch(`${API_URL}/${id}`, {
        method: "DELETE"
    })
    .then(() => {
        loadSuppliers();
    });
}


// 🧹 CLEAR FORM
function clearForm() {
    document.getElementById("name").value = "";
    document.getElementById("contact").value = "";
    document.getElementById("address").value = "";
}


// AUTO LOAD
loadSuppliers();

</script>

</body>
</html>
