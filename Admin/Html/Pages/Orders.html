<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">
    <title>Admin Dashboard - Orders</title>
</head>
<body>

<div class="main-admin-dashboard">

    <!-- SIDEBAR -->
    <div class="side-bar">
        <h1>Admin Dashboard</h1>

        <div class="pages-links">
            <ul>
                <a href="#">Categories</a>
                <a href="#" onclick="loadOrders()">Orders</a>
            </ul>
        </div>
    </div>

    <!-- DASHBOARD CONTENT -->
    <div class="dashboard-content">

        <h2>Order Management</h2>

        <!-- CREATE ORDER -->
        <div>
            <h3>Create Order</h3>

            <input type="date" id="order_date" placeholder="Order Date">
            <input type="number" id="total_amount" placeholder="Total Amount">
            <input type="text" id="status" placeholder="Status">
            <input type="number" id="user_id" placeholder="User ID">

            <button onclick="createOrder()">Add Order</button>
        </div>

        <hr>

        <!-- TABLE -->
        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Order Date</th>
                    <th>Total Amount</th>
                    <th>Status</th>
                    <th>User ID</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="orderTable"></tbody>
        </table>

    </div>

</div>

<script>

const API_URL = "http://localhost:8000/api/orders";


// 📥 READ ALL ORDERS
function loadOrders() {
    fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            let rows = "";

            data.forEach(order => {
                rows += `
                <tr>
                    <td>${order.order_id}</td>
                    <td>${order.order_date}</td>
                    <td>${order.total_amount}</td>
                    <td>${order.status}</td>
                    <td>${order.user_id}</td>
                    <td>
                        <button onclick="deleteOrder(${order.order_id})">Delete</button>
                    </td>
                </tr>`;
            });

            document.getElementById("orderTable").innerHTML = rows;
        });
}


// ➕ CREATE ORDER
function createOrder() {
    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            order_date: document.getElementById("order_date").value,
            total_amount: document.getElementById("total_amount").value,
            status: document.getElementById("status").value,
            user_id: document.getElementById("user_id").value
        })
    })
    .then(res => res.json())
    .then(() => {
        loadOrders();
    });
}


// ❌ DELETE ORDER
function deleteOrder(id) {
    fetch(`${API_URL}/${id}`, {
        method: "DELETE"
    })
    .then(() => {
        loadOrders();
    });
}


// AUTO LOAD
loadOrders();

</script>

</body>
</html>
