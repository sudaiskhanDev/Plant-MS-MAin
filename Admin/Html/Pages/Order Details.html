<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">
    <title>Admin Dashboard - Order Details</title>
    <style>
        .dashboard-content {
            flex: 1;
            padding: 2rem 2.5rem;
            background-color: #121212;
            color: #e0e0e0;
            overflow-y: auto;
        }

        .dashboard-content h2 {
            font-size: 1.8rem;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 1.5rem;
            border-left: 4px solid #C6A56A;
            padding-left: 1rem;
        }

        .form-container {
            background: #1e1e1e;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            margin-bottom: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            align-items: end;
        }

        .dashboard-content input {
            padding: 0.75rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #2d2d2d;
            color: #fff;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        .dashboard-content input:focus {
            border-color: #C6A56A;
            background-color: #333;
        }

        .dashboard-content button {
            background-color: #C6A56A;
            color: #121212;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dashboard-content button:hover {
            background-color: #d4b885;
            transform: translateY(-2px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background-color: #252525;
            color: #C6A56A;
            font-weight: 600;
            text-align: left;
            padding: 1.2rem;
            border-bottom: 2px solid #333;
        }

        td {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid #333;
        }

        tr:hover td {
            background-color: #252525;
        }

        .btn-delete {
            background-color: #cf6679 !important;
            color: white !important;
        }
    </style>
</head>
<body>

<div class="main-admin-dashboard">

    <!-- SIDEBAR -->
    <div class="side-bar">
        <h1>Admin Dashboard</h1>

        <div class="pages-links">
            <ul>
                <a href="#">Categories</a>
                <a href="#" onclick="loadOrderDetails()">Order Details</a>
            </ul>
        </div>
    </div>

    <!-- DASHBOARD CONTENT -->
    <div class="dashboard-content">

        <h2>Order Details Management</h2>

        <!-- FORM -->
        <div class="form-container">
            <h3>Add / Update Order Detail</h3>
            <div class="form-grid">
                <input type="number" id="order_id" placeholder="Order ID">
                <input type="number" id="plant_id" placeholder="Plant ID">
                <input type="number" id="quantity" placeholder="Quantity">
                <input type="number" id="price" placeholder="Price">

                <button onclick="saveOrderDetail()">Save Detail</button>
            </div>
        </div>

        <hr>

        <!-- TABLE -->
        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Order ID</th>
                    <th>Plant ID</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="orderDetailTable"></tbody>
        </table>

    </div>

</div>

<script>

const API_URL = "http://localhost:8000/api/order-details";

let editMode = false;
let editId = null;


// 📥 READ
function loadOrderDetails() {
    fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            let rows = "";

            data.forEach(item => {
                rows += `
                <tr>
                    <td>${item.order_detail_id}</td>
                    <td>${item.order_id}</td>
                    <td>${item.plant_id}</td>
                    <td>${item.quantity}</td>
                    <td>${item.price}</td>
                    <td>
                        <button style="background-color: #4a4a4a; color: white;" onclick="editOrderDetail(${item.order_detail_id}, ${item.order_id}, ${item.plant_id}, ${item.quantity}, ${item.price})">Edit</button>
                        <button class="btn-delete" onclick="deleteOrderDetail(${item.order_detail_id})">Delete</button>
                    </td>
                </tr>`;
            });

            document.getElementById("orderDetailTable").innerHTML = rows;
        });
}


// ➕ ➕ CREATE / ✏️ UPDATE
function saveOrderDetail() {

    let data = {
        order_id: document.getElementById("order_id").value,
        plant_id: document.getElementById("plant_id").value,
        quantity: document.getElementById("quantity").value,
        price: document.getElementById("price").value
    };

    if (editMode) {
        // ✏️ UPDATE
        fetch(`${API_URL}/${editId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(() => {
            editMode = false;
            editId = null;
            clearForm();
            loadOrderDetails();
        });

    } else {
        // ➕ CREATE
        fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(() => {
            clearForm();
            loadOrderDetails();
        });
    }
}


// ✏️ EDIT (FORM PREFILL)
function editOrderDetail(id, order_id, plant_id, quantity, price) {
    document.getElementById("order_id").value = order_id;
    document.getElementById("plant_id").value = plant_id;
    document.getElementById("quantity").value = quantity;
    document.getElementById("price").value = price;

    editMode = true;
    editId = id;
}


// ❌ DELETE
function deleteOrderDetail(id) {
    fetch(`${API_URL}/${id}`, {
        method: "DELETE"
    })
    .then(() => {
        loadOrderDetails();
    });
}


// 🧹 CLEAR FORM
function clearForm() {
    document.getElementById("order_id").value = "";
    document.getElementById("plant_id").value = "";
    document.getElementById("quantity").value = "";
    document.getElementById("price").value = "";
}


// AUTO LOAD
loadOrderDetails();

</script>

</body>
</html>
