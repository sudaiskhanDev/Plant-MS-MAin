<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">
    <title>Cart Dashboard</title>
</head>
<body>

<div class="main-admin-dashboard">

    <!-- SIDEBAR -->
    <div class="side-bar">
        <h1>Admin Dashboard</h1>

        <div class="pages-links">
                <ul>
                    <a href="../Admin Dashboard.html">Dashboard</a>
                     <a href="./App Plants.html">Add Plants</a>
                     <a href="./Category.html">Categories</a>
                     <a href="./Inventory.html">Inventory</a>
                    <a href="./Users.html">Users</a>
                    <a href="./Orders.html">Orders</a>
                    <a href="./Order Details.html">Order Details</a>
                    <a href="./Payment.html">Payment</a>
                    <a href="./Maintenance.html">Maintenance</a>
                    <a href="./Supplier.html">Supplier</a>
                    <a href="./supplier_order.html">Supplier Order</a>
                    <a href="./Notification.html">Notification</a>
                    <a href="./Report.html">Report</a>
                    
                   
                    
                </ul>
            </div>
    </div>

    <!-- DASHBOARD CONTENT -->
    <div class="dashboard-content">

        <h2>Cart Management</h2>

        <!-- FORM -->
        <div>
            <h3>Add / Update Cart</h3>

            <input type="number" id="user_id" placeholder="User ID">
            <input type="number" id="plant_id" placeholder="Plant ID">
            <input type="number" id="quantity" placeholder="Quantity">

            <button onclick="saveCart()">Save</button>
        </div>

        <hr>

        <!-- TABLE -->
        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>Cart ID</th>
                    <th>User ID</th>
                    <th>Plant ID</th>
                    <th>Quantity</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="cartTable"></tbody>
        </table>

    </div>

</div>

<script>

const API_URL = "http://localhost:8000/api/carts";

let editMode = false;
let editId = null;


// 📥 READ
function loadCarts() {
    fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            let rows = "";

            data.forEach(cart => {
                rows += `
                <tr>
                    <td>${cart.cart_id}</td>
                    <td>${cart.user_id}</td>
                    <td>${cart.plant_id}</td>
                    <td>${cart.quantity}</td>
                    <td>
                        <button onclick="editCart(${cart.cart_id}, ${cart.user_id}, ${cart.plant_id}, ${cart.quantity})">Edit</button>
                        <button onclick="deleteCart(${cart.cart_id})">Delete</button>
                    </td>
                </tr>`;
            });

            document.getElementById("cartTable").innerHTML = rows;
        });
}


// ➕ CREATE / ✏️ UPDATE
function saveCart() {

    let data = {
        user_id: document.getElementById("user_id").value,
        plant_id: document.getElementById("plant_id").value,
        quantity: document.getElementById("quantity").value
    };

    if (editMode) {

        // ✏️ UPDATE
        fetch(`${API_URL}/${editId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(() => {
            editMode = false;
            editId = null;
            clearForm();
            loadCarts();
        });

    } else {

        // ➕ CREATE
        fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(() => {
            clearForm();
            loadCarts();
        });
    }
}


// ✏️ EDIT (Prefill Form)
function editCart(id, user_id, plant_id, quantity) {
    document.getElementById("user_id").value = user_id;
    document.getElementById("plant_id").value = plant_id;
    document.getElementById("quantity").value = quantity;

    editMode = true;
    editId = id;
}


// ❌ DELETE
function deleteCart(id) {
    fetch(`${API_URL}/${id}`, {
        method: "DELETE"
    })
    .then(() => {
        loadCarts();
    });
}


// 🧹 CLEAR FORM
function clearForm() {
    document.getElementById("user_id").value = "";
    document.getElementById("plant_id").value = "";
    document.getElementById("quantity").value = "";
}


// AUTO LOAD
loadCarts();

</script>

</body>
</html>
