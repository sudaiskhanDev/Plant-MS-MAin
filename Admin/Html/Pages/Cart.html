<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">
    <title>Cart Dashboard</title>
</head>
<body>

<div class="main-admin-dashboard">

    <!-- Sidebar -->
    <div class="side-bar">
        <h1>Admin Dashboard</h1>

        <div class="pages-links">
            <ul>
                <a href="#">Categories</a>
                <a href="#" onclick="loadCarts()">Carts</a>
            </ul>
        </div>
    </div>

    <!-- DASHBOARD CONTENT -->
    <div class="dashboard-content">

        <h2>Cart Management</h2>

        <!-- CREATE FORM -->
        <div>
            <h3>Add Cart</h3>

            <input type="number" id="user_id" placeholder="User ID">
            <input type="number" id="plant_id" placeholder="Plant ID">
            <input type="number" id="quantity" placeholder="Quantity">

            <button onclick="createCart()">Add</button>
        </div>

        <hr>

        <!-- TABLE -->
        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>Cart ID</th>
                    <th>User ID</th>
                    <th>Plant ID</th>
                    <th>Quantity</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="cartTable"></tbody>
        </table>

    </div>

</div>

<script>
const API_URL = "http://localhost:8000/api/carts";

// 🔄 READ (GET ALL)
function loadCarts() {
    fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            let rows = "";

            data.forEach(cart => {
                rows += `
                <tr>
                    <td>${cart.cart_id}</td>
                    <td>${cart.user_id}</td>
                    <td>${cart.plant_id}</td>
                    <td>${cart.quantity}</td>
                    <td>
                        <button onclick="deleteCart(${cart.cart_id})">Delete</button>
                    </td>
                </tr>`;
            });

            document.getElementById("cartTable").innerHTML = rows;
        });
}

// ➕ CREATE
function createCart() {
    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id: document.getElementById("user_id").value,
            plant_id: document.getElementById("plant_id").value,
            quantity: document.getElementById("quantity").value
        })
    })
    .then(res => res.json())
    .then(() => {
        loadCarts();
    });
}

// ❌ DELETE
function deleteCart(id) {
    fetch(`${API_URL}/${id}`, {
        method: "DELETE"
    })
    .then(() => {
        loadCarts();
    });
}

// AUTO LOAD
loadCarts();
</script>

</body>
</html>
