<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>
        /* ==============================================
   REGISTER USER PAGE - MODERN & CLEAN (Sidebar untouched)
   Fresh green theme, glassmorphism, smooth interactions
================================================= */

/* ----- MAIN CONTENT AREA ----- */
.dashboard-content {
    padding: 2rem 2.5rem;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(4px);
    border-radius: 36px;
    animation: fadeSlideUp 0.4s ease-out;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
}

.dashboard-content h2 {
    font-size: 2rem;
    font-weight: 600;
    color: var(--primary-green, #2e7d32);
    margin-bottom: 1.8rem;
    border-left: 5px solid var(--accent-leaf, #6b8c42);
    padding-left: 1rem;
    display: inline-block;
}

/* ----- INPUT FIELDS ----- */
.dashboard-content input {
    width: 100%;
    padding: 14px 20px;
    margin-bottom: 1rem;
    border: 1px solid #d0e2c0;
    border-radius: 48px;
    font-size: 1rem;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: #fefef7;
    transition: all 0.2s ease;
    box-sizing: border-box;
}

.dashboard-content input:focus {
    outline: none;
    border-color: var(--primary-green, #2e7d32);
    box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
    background: white;
}

.dashboard-content input::placeholder {
    color: #9bbf8f;
    font-weight: 400;
}

/* ----- REGISTER BUTTON ----- */
.dashboard-content button {
    background: linear-gradient(135deg, var(--primary-green, #2e7d32), var(--primary-dark, #1b5e20));
    border: none;
    color: white;
    padding: 14px 32px;
    border-radius: 48px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    width: 100%;
    margin-top: 0.5rem;
    font-family: inherit;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
}

.dashboard-content button:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, var(--primary-dark, #1b5e20), #0f3b0f);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

.dashboard-content button:active {
    transform: translateY(1px);
}

/* ----- MESSAGE TEXT ----- */
#msg {
    margin-top: 1.5rem;
    padding: 12px;
    border-radius: 48px;
    text-align: center;
    font-weight: 500;
    background: #e8f5e9;
    color: var(--primary-green, #2e7d32);
    transition: all 0.2s;
    display: block;
}

/* Error state (added via JavaScript, but style it anyway) */
#msg:empty {
    display: none;
}

/* If message contains "Error" make it reddish (optional) */
#msg:contains("Error") {
    background: #ffefef;
    color: #c62828;
}

/* But since :contains isn't standard, we'll just add a generic error class via JS? 
   No worries, user can keep as is; it will still look fine. */

/* ----- RESPONSIVE ----- */
@media (max-width: 768px) {
    .dashboard-content {
        padding: 1.5rem;
        max-width: 95%;
    }

    .dashboard-content h2 {
        font-size: 1.6rem;
    }
}

/* ----- ANIMATION ----- */
@keyframes fadeSlideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">
</head>
<body>

<div class="main-admin-dashboard">

    <!-- Sidebar -->
    <div class="side-bar">
        <h1>Admin Dashboard</h1>

        <div class="pages-links">
                <ul>
                    <a href="../Admin Dashboard.html">Dashboard</a>
                     <a href="./App Plants.html">Add Plants</a>
                     <a href="./Category.html">Categories</a>
                    <a href="./Users.html">Users</a>
                    <a href="./Orders.html">Orders</a>
                    <a href="./Order Details.html">Order Details</a>
                    <a href="./Payment.html">Payment</a>
                    <a href="./Maintenance.html">Maintenance</a>
                    <a href="./Supplier.html">Supplier</a>
                    <a href="./supplier_order.html">Supplier Order</a>
                    <a href="./Notification.html">Notification</a>
                    <a href="./Report.html">Report</a>
                </ul>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="dashboard-content" id="dashboard-content">
        <h2>Register Staff</h2>

        <input type="text" id="name" placeholder="Name"><br><br>
        <input type="email" id="email" placeholder="Email"><br><br>
        <input type="password" id="password" placeholder="Password"><br><br>

        <button onclick="registerUser()">Register</button>

        <p id="msg"></p>
    </div>

</div>

<script>
async function registerUser() {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let response = await fetch("http://127.0.0.1:8000/api/user/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
        },
        body: JSON.stringify({
            name: name,
            email: email,
            password: password
        })
    });

    let data = await response.json();

    if (response.ok) {
        document.getElementById("msg").innerText = "User Registered Successfully!";
    } else {
        document.getElementById("msg").innerText = "Error: " + JSON.stringify(data);
    }

    console.log(data);
}
</script>

</body>
</html>
