<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">
    <title>Admin Dashboard - Maintenance</title>
</head>
<body>

<div class="main-admin-dashboard">

    <!-- SIDEBAR -->
    <div class="side-bar">
        <h1>Admin Dashboard</h1>

        <div class="pages-links">
            <ul>
                <a href="#">Categories</a>
                <a href="#" onclick="loadMaintenance()">Maintenance</a>
            </ul>
        </div>
    </div>

    <!-- DASHBOARD CONTENT -->
    <div class="dashboard-content">

        <h2>Maintenance Management</h2>

        <!-- FORM -->
        <div>
            <h3>Add / Update Maintenance Task</h3>

            <input type="number" id="plant_id" placeholder="Plant ID">
            <input type="text" id="task_type" placeholder="Task Type (watering/pruning/fertilization)">
            <input type="date" id="scheduled_date">
            <input type="text" id="status" placeholder="Status">

            <button onclick="saveMaintenance()">Save</button>
        </div>

        <hr>

        <!-- TABLE -->
        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Plant ID</th>
                    <th>Task Type</th>
                    <th>Scheduled Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="maintenanceTable"></tbody>
        </table>

    </div>

</div>

<script>

const API_URL = "http://localhost:8000/api/maintenances";

let editMode = false;
let editId = null;


// 📥 READ
function loadMaintenance() {
    fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            let rows = "";

            data.forEach(item => {
                rows += `
                <tr>
                    <td>${item.maintenance_id}</td>
                    <td>${item.plant_id}</td>
                    <td>${item.task_type}</td>
                    <td>${item.scheduled_date}</td>
                    <td>${item.status}</td>
                    <td>
                        <button onclick="editMaintenance(${item.maintenance_id}, ${item.plant_id}, '${item.task_type}', '${item.scheduled_date}', '${item.status}')">Edit</button>
                        <button onclick="deleteMaintenance(${item.maintenance_id})">Delete</button>
                    </td>
                </tr>`;
            });

            document.getElementById("maintenanceTable").innerHTML = rows;
        });
}


// ➕ ➕ CREATE / ✏️ UPDATE
function saveMaintenance() {

    let data = {
        plant_id: document.getElementById("plant_id").value,
        task_type: document.getElementById("task_type").value,
        scheduled_date: document.getElementById("scheduled_date").value,
        status: document.getElementById("status").value
    };

    if (editMode) {

        // ✏️ UPDATE
        fetch(`${API_URL}/${editId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(() => {
            editMode = false;
            editId = null;
            clearForm();
            loadMaintenance();
        });

    } else {

        // ➕ CREATE
        fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(() => {
            clearForm();
            loadMaintenance();
        });
    }
}


// ✏️ EDIT
function editMaintenance(id, plant_id, task_type, scheduled_date, status) {

    document.getElementById("plant_id").value = plant_id;
    document.getElementById("task_type").value = task_type;
    document.getElementById("scheduled_date").value = scheduled_date;
    document.getElementById("status").value = status;

    editMode = true;
    editId = id;
}


// ❌ DELETE
function deleteMaintenance(id) {
    fetch(`${API_URL}/${id}`, {
        method: "DELETE"
    })
    .then(() => {
        loadMaintenance();
    });
}


// 🧹 CLEAR FORM
function clearForm() {
    document.getElementById("plant_id").value = "";
    document.getElementById("task_type").value = "";
    document.getElementById("scheduled_date").value = "";
    document.getElementById("status").value = "";
}


// AUTO LOAD
loadMaintenance();

</script>

</body>
</html>
