<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">
    
 
    
    <title>Document</title>
</head>
<body>
     <div class="main-admin-dashboard">
        
        <!-- Sidebar containing navigation links for admin modules -->
        <div class="side-bar">
            <h1>Admin Dashboard</h1>

            <div class="pages-links">
                <ul>
                    <a href="#">Categories</a>
                </ul>
            </div>
        </div>
        
       <div class="dashboard-content">

    <h2>Categories</h2>

    <!-- CREATE -->
    <div>
        <input type="text" id="category_name" placeholder="Category Name">
        <button onclick="addCategory()">Add</button>
    </div>

    <hr>

    <!-- LIST CONTAINER (EMPTY) -->
    <div id="categoryList"></div>

</div>
        
    </div>


    <script>

const API = "http://127.0.0.1:8000/api/categories";
const token = localStorage.getItem("token");

// LOAD
async function loadCategories() {
    const res = await fetch(API, {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();

    const container = document.getElementById("categoryList");
    container.innerHTML = "";

    data.forEach(cat => {

        // create elements ONLY (no innerHTML HTML strings)
        const wrapper = document.createElement("div");
        wrapper.style.margin = "10px 0";

        const input = document.createElement("input");
        input.value = cat.category_name;
        input.id = "edit-" + cat.category_id;

        const updateBtn = document.createElement("button");
        updateBtn.innerText = "Update";
        updateBtn.onclick = () => updateCategory(cat.category_id);

        const deleteBtn = document.createElement("button");
        deleteBtn.innerText = "Delete";
        deleteBtn.onclick = () => deleteCategory(cat.category_id);

        wrapper.appendChild(input);
        wrapper.appendChild(updateBtn);
        wrapper.appendChild(deleteBtn);

        container.appendChild(wrapper);
    });
}

// CREATE
async function addCategory() {
    const name = document.getElementById("category_name").value;

    if (!name) {
        alert("Category name required");
        return;
    }

    await fetch(API, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            category_name: name
        })
    });

    document.getElementById("category_name").value = "";
    loadCategories();
}

// UPDATE
async function updateCategory(id) {
    const name = document.getElementById("edit-" + id).value;

    await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            category_name: name
        })
    });

    loadCategories();
}

// DELETE
async function deleteCategory(id) {
    await fetch(`${API}/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    loadCategories();
}

// INIT
loadCategories();

</script>
</body>
</html>
