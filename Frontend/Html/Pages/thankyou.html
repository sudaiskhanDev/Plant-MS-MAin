<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - GreenNest</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap');

        :root {
            --primary-green: #2C7A47;
            --primary-dark: #1A3A2E;
            --bg-page: #F8FBF9;
            --text-dark: #1E2F2A;
            --text-muted: #5C6F66;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .thank-you-card {
            background: white;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #E9F3EB;
            color: var(--primary-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 1.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            color: var(--primary-dark);
            margin-bottom: 1rem;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-green);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            color: var(--primary-green);
            font-size: 0.95rem;
        }

        .btn-secondary:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <div class="icon-circle">✔</div>
        <h1>Order Placed!</h1>
        <p>Thank you for shopping with GreenNest. Your plants are being prepared for their new home!</p>
        
        <div class="btn-group">
            <a href="../index.html" class="btn btn-primary">Continue Shopping</a>
            <a href="All Products.html" class="btn btn-secondary">View More Plants</a>
        </div>
    </div>

</body>
</html>
