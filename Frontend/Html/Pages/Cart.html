<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>
 
<style>
    /* ============================================
   CART PAGE - GREENNEST MODERN STYLES
   Botanical fresh theme | Responsive cart items
   Fonts: Inter + Outfit | Smooth interactions
   ============================================ */

/* ---------- IMPORT MODERN FONTS ---------- */
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Outfit:wght@400;500;600;700;800&display=swap');

/* ---------- CSS VARIABLES (Fresh Green Theme) ---------- */
:root {
  --primary-dark: #1A3A2E;
  --primary-green: #2C7A47;
  --primary-soft: #9DC3A2;
  --primary-light: #E9F3EB;
  --bg-white: #FFFFFF;
  --bg-page: #F8FBF9;
  --text-dark: #1E2F2A;
  --text-muted: #5C6F66;
  --text-light: #8A9C91;
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 8px 20px rgba(44, 122, 71, 0.06);
  --shadow-lg: 0 12px 28px rgba(0, 0, 0, 0.08);
  --shadow-hover: 0 18px 30px rgba(44, 122, 71, 0.12);
  --radius-card: 20px;
  --radius-btn: 50px;
  --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

/* ---------- GLOBAL RESET ---------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', 'Outfit', system-ui, -apple-system, sans-serif;
  background-color: var(--bg-page);
  color: var(--text-dark);
  line-height: 1.5;
  font-size: 15px;
  padding: 2rem;
  max-width: 1200px;
  margin: 0 auto;
}

/* ---------- SIMPLE NAVIGATION LINKS (Home / Cart) ---------- */
body > div:first-child {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 2rem;
  padding-bottom: 0.75rem;
  border-bottom: 2px solid var(--primary-light);
}

body > div:first-child a {
  text-decoration: none;
  font-weight: 600;
  font-size: 1rem;
  color: var(--text-dark);
  transition: var(--transition);
  position: relative;
  padding: 0.25rem 0;
}

body > div:first-child a::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--primary-green);
  transition: width 0.25s ease;
  border-radius: 2px;
}

body > div:first-child a:hover::after {
  width: 100%;
}

body > div:first-child a:hover {
  color: var(--primary-green);
}

/* ---------- PAGE HEADING ---------- */
h2 {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 2rem;
  letter-spacing: -0.02em;
  color: var(--primary-dark);
  margin-bottom: 1.5rem;
  border-left: 5px solid var(--primary-green);
  padding-left: 1rem;
}

/* ---------- CART CONTAINER (grid of items) ---------- */
#cartContainer {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  margin-bottom: 2rem;
}

/* loading / empty / login message */
#cartContainer:empty::before {
  content: "🛒 Your cart is empty";
  display: block;
  text-align: center;
  padding: 3rem;
  background: var(--bg-white);
  border-radius: var(--radius-card);
  color: var(--text-muted);
  font-weight: 500;
  box-shadow: var(--shadow-sm);
  border: 1px dashed var(--primary-soft);
}

/* Cart item card */
.cart-box {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1.5rem;
  background: var(--bg-white);
  border-radius: var(--radius-card);
  padding: 1.5rem;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  border: 1px solid rgba(157, 195, 162, 0.3);
}

.cart-box:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-hover);
  border-color: var(--primary-soft);
}

/* product image */
.cart-box img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 16px;
  background: var(--primary-light);
  box-shadow: var(--shadow-sm);
}

/* product details block */
.cart-box > div:nth-child(2) {
  flex: 2;
  min-width: 180px;
}

.cart-box h3 {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 1.2rem;
  color: var(--text-dark);
  margin-bottom: 0.5rem;
}

.cart-box p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin: 0.25rem 0;
}

/* buttons container */
.cart-box > div:last-child {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  align-items: center;
}

/* button base */
.cart-box button {
  border: none;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  padding: 0.5rem 1rem;
  border-radius: var(--radius-btn);
  cursor: pointer;
  transition: var(--transition);
  min-width: 48px;
}

/* increment */
.inc {
  background: var(--primary-green);
  color: white;
  box-shadow: 0 2px 6px rgba(44, 122, 71, 0.2);
}

.inc:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

/* decrement */
.dec {
  background: var(--primary-light);
  color: var(--primary-dark);
}

.dec:hover {
  background: var(--primary-soft);
  transform: translateY(-2px);
}

/* delete button */
.del {
  background: #FEF5F3;
  color: #E53E3E;
  border: 1px solid rgba(229, 62, 62, 0.3);
}

.del:hover {
  background: #E53E3E;
  color: white;
  transform: translateY(-2px);
  border-color: #E53E3E;
}

/* ---------- TOTAL PRICE SECTION ---------- */
.total {
  background: var(--bg-white);
  border-radius: var(--radius-card);
  padding: 1rem 1.5rem;
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--primary-green);
  text-align: right;
  margin: 1.5rem 0;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--primary-light);
}

/* checkout link */
a[href="./Checkout.html"] {
  display: inline-block;
  background: var(--primary-green);
  color: white;
  text-decoration: none;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  padding: 0.9rem 2rem;
  border-radius: var(--radius-btn);
  transition: var(--transition);
  text-align: center;
  box-shadow: 0 2px 8px rgba(44, 122, 71, 0.25);
  letter-spacing: 0.5px;
}

a[href="./Checkout.html"]:hover {
  background: var(--primary-dark);
  transform: translateY(-3px);
  box-shadow: var(--shadow-hover);
}

/* checkout container (optional) */
body > a:last-child {
  display: inline-block;
  margin-top: 1rem;
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 768px) {
  body {
    padding: 1.5rem;
  }
  h2 {
    font-size: 1.6rem;
  }
  .cart-box {
    flex-direction: column;
    align-items: stretch;
    text-align: center;
  }
  .cart-box img {
    margin: 0 auto;
  }
  .cart-box > div:last-child {
    justify-content: center;
  }
  .total {
    text-align: center;
    font-size: 1.2rem;
  }
  a[href="./Checkout.html"] {
    width: 100%;
    text-align: center;
  }
}

@media (max-width: 480px) {
  body {
    padding: 1rem;
  }
  .cart-box h3 {
    font-size: 1rem;
  }
  .cart-box p {
    font-size: 0.8rem;
  }
  .cart-box button {
    padding: 0.4rem 0.8rem;
    font-size: 0.9rem;
  }
  .total {
    font-size: 1.1rem;
  }
}

/* ---------- LOGIN MESSAGE STYLING (if token missing) ---------- */
#cartContainer:contains("Please login first") {
  background: var(--bg-white);
  border-radius: var(--radius-card);
  padding: 2rem;
  text-align: center;
  color: var(--text-muted);
  font-weight: 500;
  box-shadow: var(--shadow-sm);
}

/* fallback for text content (pure JS message) */
#cartContainer[innerHTML*="login"] {
  background: var(--bg-white);
  border-radius: var(--radius-card);
  padding: 2rem;
  text-align: center;
}

/* ---------- ACCESSIBILITY & FOCUS ---------- */
button:focus-visible,
a:focus-visible {
  outline: 2px solid var(--primary-green);
  outline-offset: 2px;
  border-radius: var(--radius-btn);
}

/* ---------- SCROLLBAR ---------- */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: var(--primary-light);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: var(--primary-soft);
  border-radius: 10px;
}
</style>
 
</head>

<body>
  <div>
            <a href="../index.html">Home</a>
            <a href="../Pages/Cart.html">Cart</a>
        </div>
<h2>My Cart</h2>

<div id="cartContainer">Loading...</div>

<div class="total" id="totalPrice"></div>
<a href="./Checkout.html">Checkout</a>
<script>

const API = "http://127.0.0.1:8000/api/carts";
const STORAGE = "http://127.0.0.1:8000/storage";

const token = localStorage.getItem("token");

let cartData = [];

loadCart();

// ================= LOAD CART =================
async function loadCart() {

    if (!token) {
        document.getElementById("cartContainer").innerHTML =
            "Please login first";
        return;
    }

    const res = await fetch(API, {
        headers: {
            "Authorization": "Bearer " + token,
            "Accept": "application/json"
        }
    });

    cartData = await res.json();

    renderCart();
}

// ================= RENDER =================
function renderCart() {

    let html = "";
    let total = 0;

    cartData.forEach(item => {

        const plant = item.plant;

        if (!plant) return;

        const price = parseFloat(plant.price);
        const qty = item.quantity;
        const subtotal = price * qty;

        total += subtotal;

        html += `
        <div class="cart-box">
            
            <img src="${STORAGE}/${plant.image}" />

            <div>
                <h3>${plant.name}</h3>
                <p>Price: $${price}</p>
                <p>Qty: ${qty}</p>
                <p>Subtotal: $${subtotal}</p>
            </div>

            <div>
                <button class="inc" onclick="increase(${item.cart_id}, ${qty})">+</button>
                <button class="dec" onclick="decrease(${item.cart_id}, ${qty})">-</button>
                <button class="del" onclick="removeItem(${item.cart_id})">Delete</button>
            </div>

        </div>
        `;
    });

    document.getElementById("cartContainer").innerHTML = html;
    document.getElementById("totalPrice").innerText = "Total: $" + total.toFixed(2);
}

// ================= INCREASE =================
async function increase(id, qty) {

    await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            quantity: qty + 1
        })
    });

    loadCart();
}

// ================= DECREASE =================
async function decrease(id, qty) {

    if (qty <= 1) return;

    await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            quantity: qty - 1
        })
    });

    loadCart();
}

// ================= DELETE =================
async function removeItem(id) {

    await fetch(`${API}/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    loadCart();
}

</script>

</body>
</html>
