<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<script src="https://js.stripe.com/v3/"></script>
 
<style>
    /* Global Styles & Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
    min-height: 100vh;
    padding: 2rem 1rem;
    color: #1e2a3a;
}

/* Main Container */
.container {
    max-width: 1200px;
    margin: 0 auto;
    background: transparent;
    display: flex;
    flex-wrap: wrap;
    gap: 2rem;
    justify-content: center;
}

/* Headings */
h2 {
    width: 100%;
    text-align: center;
    font-size: 2.5rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    color: #0f3b2c;
    letter-spacing: -0.5px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
}

h3 {
    font-size: 1.5rem;
    font-weight: 500;
    margin-bottom: 1rem;
    border-left: 5px solid #2c7a4d;
    padding-left: 1rem;
    color: #1e3a2f;
}

/* Box Styles (Cart & Form Sections) */
.box {
    background: white;
    border-radius: 28px;
    box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
    padding: 1.8rem;
    flex: 1;
    min-width: 280px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.box:hover {
    transform: translateY(-3px);
    box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.2);
}

/* Cart Items Container */
#cartContainer {
    max-height: 400px;
    overflow-y: auto;
    margin-bottom: 1rem;
    padding-right: 0.5rem;
}

/* Custom Scrollbar */
#cartContainer::-webkit-scrollbar {
    width: 6px;
}

#cartContainer::-webkit-scrollbar-track {
    background: #e2e8f0;
    border-radius: 10px;
}

#cartContainer::-webkit-scrollbar-thumb {
    background: #2c7a4d;
    border-radius: 10px;
}

/* Individual Cart Item */
.cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.9rem 0;
    border-bottom: 1px solid #e9edf2;
    font-size: 1rem;
}

.cart-item:last-child {
    border-bottom: none;
}

.cart-item span:first-child {
    font-weight: 500;
    color: #2d3e50;
}

.cart-item span:last-child {
    font-weight: 600;
    color: #1f8a4c;
    background: #e6f4ea;
    padding: 0.2rem 0.8rem;
    border-radius: 40px;
}

/* Total Box */
#totalBox {
    font-size: 1.6rem;
    font-weight: 700;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 2px dashed #cbd5e1;
    text-align: right;
    color: #0f3b2c;
    background: #f8fafc;
    border-radius: 20px;
    padding: 0.8rem 1rem;
}

/* Input Fields & Select */
input, select {
    width: 100%;
    padding: 0.9rem 1rem;
    margin-bottom: 1.2rem;
    border: 1.5px solid #e2e8f0;
    border-radius: 20px;
    font-size: 1rem;
    font-family: inherit;
    background: #ffffff;
    transition: all 0.2s ease;
    color: #1e2a3a;
}

input:focus, select:focus {
    outline: none;
    border-color: #2c7a4d;
    box-shadow: 0 0 0 3px rgba(44, 122, 77, 0.2);
}

input::placeholder {
    color: #94a3b8;
    font-weight: 400;
}

/* Card Container */
#card-container {
    margin: 0.5rem 0 1.2rem 0;
    padding: 0.8rem;
    background: #f8fafc;
    border-radius: 20px;
    border: 1px solid #e2e8f0;
}

#card-element {
    padding: 0.7rem 0;
    background: white;
    border-radius: 16px;
}

/* Error Box */
.error {
    color: #dc2626;
    font-size: 0.85rem;
    margin: 0.5rem 0 1rem;
    padding: 0.5rem;
    background: #fee2e2;
    border-radius: 40px;
    text-align: center;
    font-weight: 500;
}

/* Place Order Button */
button {
    background: #0f3b2c;
    color: white;
    border: none;
    padding: 1rem 1.5rem;
    font-size: 1.1rem;
    font-weight: 600;
    border-radius: 40px;
    width: 100%;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 0.5rem;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

button:hover {
    background: #1f5e43;
    transform: scale(1.01);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.15);
}

button:active {
    transform: scale(0.98);
}

/* Empty cart / info messages */
#cartContainer:contains("Login required"),
#cartContainer:contains("Cart is empty"),
#cartContainer:contains("Error loading cart") {
    text-align: center;
    padding: 2rem;
    color: #64748b;
    font-style: italic;
    background: #f1f5f9;
    border-radius: 28px;
}

/* Responsive Design */
@media (max-width: 768px) {
    body {
        padding: 1rem;
    }
    
    .container {
        gap: 1.2rem;
    }
    
    .box {
        padding: 1.3rem;
    }
    
    h2 {
        font-size: 2rem;
        margin-bottom: 1rem;
    }
    
    h3 {
        font-size: 1.3rem;
    }
    
    .cart-item {
        font-size: 0.9rem;
        flex-wrap: wrap;
        gap: 0.5rem;
    }
    
    .cart-item span:last-child {
        margin-left: auto;
    }
    
    #totalBox {
        font-size: 1.3rem;
    }
    
    button {
        padding: 0.85rem;
        font-size: 1rem;
    }
}

@media (max-width: 480px) {
    .box {
        min-width: 100%;
    }
    
    h2 {
        font-size: 1.7rem;
    }
    
    input, select {
        padding: 0.7rem 0.9rem;
        margin-bottom: 1rem;
    }
}
</style>

</head>
<body>

<div class="container">

<h2>Checkout</h2>

<div class="box">
    <h3>Cart Items</h3>
    <div id="cartContainer">Loading...</div>
    <h3 id="totalBox"></h3>
</div>

<div class="box">

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="phone" placeholder="Phone">
<input type="text" id="city" placeholder="City">
<input type="text" id="zip" placeholder="Zip">
<input type="text" id="address" placeholder="Shipping Address">

<select id="payment_method">
    <option value="cod">Cash on Delivery</option>
    <option value="card">Card (Stripe)</option>
</select>

<div id="card-container" style="display:none;">
    <div id="card-element"></div>
</div>

<div id="errorBox" class="error"></div>

<button onclick="placeOrder()">Place Order</button>

</div>

</div>

<script>
const API = "http://127.0.0.1:8000/api";
const CART_API = `${API}/carts`;
const CHECKOUT_API = `${API}/checkout`;
const STRIPE_API = `${API}/payments/create-payment-intent`;

const token = localStorage.getItem("token");

// Stripe init
const stripe = Stripe("pk_test_51T3YGjPubxVvHrmFHvOK8ut1lXw8X7nL77iYk0Y47aj4G6758ndZDGRnWu54qEuv2mk3feOfbRNTKZmwRe9A8Cbx00VNTxBm5d");

const elements = stripe.elements();
const card = elements.create("card");

let cartItems = [];
let totalAmount = 0;

// ================= CART LOAD =================
async function loadCart() {

    if (!token) {
        document.getElementById("cartContainer").innerHTML = "Login required";
        return;
    }

    try {
        let res = await fetch(CART_API, {
            headers: { "Authorization": "Bearer " + token }
        });

        let data = await res.json();

        cartItems = data.data || data;

        let container = document.getElementById("cartContainer");
        container.innerHTML = "";
        totalAmount = 0;

        if (!cartItems.length) {
            container.innerHTML = "Cart is empty";
            return;
        }

        cartItems.forEach(item => {

    if (!item.plant) return; // skip broken records

    let price = (item.plant?.price ?? 0) * (item.quantity ?? 0);
    totalAmount += price;

    container.innerHTML += `
        <div class="cart-item">
            <span>${item.plant?.name ?? 'Deleted Product'} x ${item.quantity}</span>
            <span>$${price}</span>
        </div>
    `;
});

        document.getElementById("totalBox").innerText =
            "Total: $" + totalAmount.toFixed(2);

    } catch (err) {
        console.log(err);
        document.getElementById("cartContainer").innerText = "Error loading cart";
    }
}

// ================= PAYMENT TOGGLE =================
let cardMounted = false;

document.getElementById("payment_method").addEventListener("change", function () {
    if (this.value === "card") {
        document.getElementById("card-container").style.display = "block";

        if (!cardMounted) {
            card.mount("#card-element");
            cardMounted = true;
        }
    } else {
        document.getElementById("card-container").style.display = "none";
    }
});

// ================= PLACE ORDER =================
async function placeOrder() {

    document.getElementById("errorBox").innerText = "";

    if (!cartItems.length) {
        document.getElementById("errorBox").innerText = "Cart is empty";
        return;
    }

    let payload = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        city: document.getElementById("city").value,
        zip: document.getElementById("zip").value,
        shipping_address: document.getElementById("address").value,
        payment_method: document.getElementById("payment_method").value,
        payment_id: null
    };

    try {

        // ================= STRIPE =================
        if (payload.payment_method === "card") {

            const { error, paymentMethod } = await stripe.createPaymentMethod({
                type: "card",
                card: card,
            });

            if (error) {
                document.getElementById("errorBox").innerText = error.message;
                return;
            }

            const intentRes = await fetch(STRIPE_API, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ amount: totalAmount })
            });

            const intentText = await intentRes.text();

            let intentData;
            try {
                intentData = JSON.parse(intentText);
            } catch (e) {
                document.getElementById("errorBox").innerText = intentText;
                return;
            }

            if (!intentData.clientSecret) {
                document.getElementById("errorBox").innerText = "Stripe failed";
                return;
            }

            const { error: stripeError, paymentIntent } =
                await stripe.confirmCardPayment(intentData.clientSecret, {
                    payment_method: {
                        card: card
                    }
                });

            if (stripeError) {
                document.getElementById("errorBox").innerText = stripeError.message;
                return;
            }

            payload.payment_id = paymentIntent.id;
        }

        // ================= CHECKOUT =================
        let res = await fetch(CHECKOUT_API, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(payload)
        });

        let text = await res.text();

        let data;
        try {
            data = JSON.parse(text);
        } catch (e) {
            document.getElementById("errorBox").innerText = text;
            return;
        }

        if (!res.ok) {
            document.getElementById("errorBox").innerText =
                data.message || "Checkout failed";
            return;
        }

        alert("Order placed successfully!");
        window.location.href = "thankyou.html";

    } catch (err) {
        console.log(err);
        document.getElementById("errorBox").innerText = "Server error";
    }
}

// init
loadCart();
</script>

</body>
</html>
