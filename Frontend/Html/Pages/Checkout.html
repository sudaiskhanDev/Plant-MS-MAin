
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — GreenNest</title>

<script src="https://js.stripe.com/v3/"></script>
 
<style>
    /* ============================================
   CHECKOUT PAGE - GREENNEST MODERN STYLES
   Botanical fresh theme | Stripe card integration
   Responsive form | Loading button animation
   ============================================ */

/* ---------- IMPORT MODERN FONTS ---------- */
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Outfit:wght@400;500;600;700;800&display=swap');

/* ---------- CSS VARIABLES ---------- */
:root {
  --primary-dark: #1A3A2E;
  --primary-green: #2C7A47;
  --primary-soft: #9DC3A2;
  --primary-light: #E9F3EB;
  --bg-white: #FFFFFF;
  --bg-page: #F8FBF9;
  --text-dark: #1E2F2A;
  --text-muted: #5C6F66;
  --text-light: #8A9C91;
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 8px 20px rgba(44, 122, 71, 0.06);
  --shadow-lg: 0 12px 28px rgba(0, 0, 0, 0.08);
  --radius-card: 20px;
  --radius-input: 12px;
  --radius-btn: 50px;
  --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

/* ---------- GLOBAL RESET ---------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', 'Outfit', system-ui, -apple-system, sans-serif;
  background: var(--bg-page);
  color: var(--text-dark);
  line-height: 1.5;
  font-size: 15px;
  padding: 2rem 1.5rem;
}

/* ---------- MAIN CONTAINER ---------- */
.container {
  max-width: 800px;
  margin: 0 auto;
}

/* ---------- NAVIGATION LINKS ---------- */
.container > div:first-child {
  display: flex;
  gap: 1.8rem;
  margin-bottom: 2rem;
  padding-bottom: 0.75rem;
  border-bottom: 2px solid var(--primary-light);
}

.container > div:first-child a {
  text-decoration: none;
  font-weight: 600;
  font-size: 1rem;
  color: var(--text-dark);
  transition: var(--transition);
  position: relative;
}

.container > div:first-child a::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--primary-green);
  transition: width 0.25s ease;
  border-radius: 2px;
}

.container > div:first-child a:hover::after {
  width: 100%;
}

.container > div:first-child a:hover {
  color: var(--primary-green);
}

/* ---------- PAGE HEADING ---------- */
h2 {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 2rem;
  letter-spacing: -0.02em;
  color: var(--primary-dark);
  margin-bottom: 2rem;
  border-left: 5px solid var(--primary-green);
  padding-left: 1rem;
}

/* ---------- CARD BOXES (Cart items + Form) ---------- */
.box {
  background: var(--bg-white);
  border-radius: var(--radius-card);
  padding: 1.8rem;
  margin-bottom: 2rem;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(157, 195, 162, 0.3);
  transition: var(--transition);
}

.box:hover {
  box-shadow: var(--shadow-md);
}

.box h3 {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--primary-dark);
  margin-bottom: 1.2rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid var(--primary-light);
}

/* ---------- CART ITEMS LIST ---------- */
#cartContainer {
  margin-bottom: 1rem;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.8rem 0;
  border-bottom: 1px solid var(--primary-light);
  font-size: 0.95rem;
}

.cart-item span:first-child {
  font-weight: 500;
  color: var(--text-dark);
}

.cart-item span:last-child {
  font-weight: 700;
  color: var(--primary-green);
}

#totalBox {
  text-align: right;
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--primary-green);
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 2px solid var(--primary-light);
}

/* ---------- FORM INPUTS & SELECT ---------- */
input, select {
  width: 100%;
  padding: 0.85rem 1rem;
  margin-bottom: 1rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  border: 1.5px solid var(--primary-light);
  border-radius: var(--radius-input);
  background: var(--bg-white);
  transition: var(--transition);
  color: var(--text-dark);
}

input:focus, select:focus {
  outline: none;
  border-color: var(--primary-green);
  box-shadow: 0 0 0 3px rgba(44, 122, 71, 0.1);
}

input::placeholder {
  color: var(--text-light);
  font-weight: 400;
}

/* ---------- STRIPE CARD ELEMENT ---------- */
#card-container {
  margin: 1rem 0 1.5rem;
  padding: 0.85rem 1rem;
  border: 1.5px solid var(--primary-light);
  border-radius: var(--radius-input);
  background: var(--bg-white);
  transition: var(--transition);
}

#card-container:focus-within {
  border-color: var(--primary-green);
  box-shadow: 0 0 0 3px rgba(44, 122, 71, 0.1);
}

#card-element {
  width: 100%;
  min-height: 40px;
}

/* ---------- ERROR MESSAGE ---------- */
.error {
  background: #FEF5F3;
  border-left: 4px solid #E53E3E;
  color: #E53E3E;
  padding: 0.75rem 1rem;
  border-radius: 12px;
  margin: 1rem 0;
  font-size: 0.85rem;
  font-weight: 500;
}

/* ---------- PLACE ORDER BUTTON (LOADING STATES) ---------- */
button {
  background: var(--primary-green);
  color: white;
  border: none;
  width: 100%;
  padding: 1rem;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.5px;
  border-radius: var(--radius-btn);
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 2px 8px rgba(44, 122, 71, 0.2);
  margin-top: 0.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: relative;
}

button:hover:not(:disabled) {
  background: var(--primary-dark);
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(44, 122, 71, 0.25);
}

button:active:not(:disabled) {
  transform: translateY(0);
}

button:disabled {
  opacity: 0.8;
  cursor: not-allowed;
  transform: none;
  background: var(--primary-green);
  filter: grayscale(0.05);
}

/* Spinner animation for loading state */
.spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  border-top-color: white;
  animation: spin 0.7s linear infinite;
  margin-right: 6px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ---------- RESPONSIVE DESIGN ---------- */
@media (max-width: 640px) {
  body {
    padding: 1rem;
  }
  h2 {
    font-size: 1.6rem;
  }
  .box {
    padding: 1.2rem;
  }
  .cart-item {
    font-size: 0.85rem;
  }
  #totalBox {
    font-size: 1.2rem;
  }
  input, select, button {
    padding: 0.7rem;
  }
}

@media (max-width: 480px) {
  .container > div:first-child {
    gap: 1.2rem;
  }
  .container > div:first-child a {
    font-size: 0.9rem;
  }
  .box h3 {
    font-size: 1.1rem;
  }
}

/* ---------- LOADING STATE ---------- */
#cartContainer:empty::before {
  content: "🛒 Loading cart...";
  display: block;
  color: var(--text-muted);
  padding: 1rem 0;
  font-style: italic;
}

.StripeElement {
  width: 100%;
  padding: 0.5rem 0;
}

.StripeElement--focus {
  border-color: var(--primary-green);
}

/* ---------- ACCESSIBILITY ---------- */
button:focus-visible,
input:focus-visible,
select:focus-visible,
a:focus-visible {
  outline: 2px solid var(--primary-green);
  outline-offset: 2px;
  border-radius: 8px;
}

/* ---------- SCROLLBAR ---------- */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: var(--primary-light);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: var(--primary-soft);
  border-radius: 10px;
}
</style>

</head>
<body>

<div class="container">
  <div>
    <a href="../index.html">Home</a>
    <a href="../Pages/Cart.html">Cart</a>
  </div>
  <h2>Checkout</h2>

  <div class="box">
    <h3>Cart Items</h3>
    <div id="cartContainer">Loading...</div>
    <h3 id="totalBox"></h3>
  </div>

  <div class="box">
    <input type="text" id="name" placeholder="Full Name" autocomplete="name">
    <input type="text" id="phone" placeholder="Phone" autocomplete="tel">
    <input type="text" id="city" placeholder="City" autocomplete="address-level2">
    <input type="text" id="zip" placeholder="Zip" autocomplete="postal-code">
    <input type="text" id="address" placeholder="Shipping Address" autocomplete="street-address">

    <select id="payment_method">
      <option value="cod">Cash on Delivery</option>
      <option value="card">Card (Stripe)</option>
    </select>

    <div id="card-container" style="display:none;">
      <div id="card-element"></div>
    </div>

    <div id="errorBox" class="error" style="display: none;"></div>

    <button id="placeOrderBtn">Place Order</button>
  </div>
</div>

<script>
const API = "http://127.0.0.1:8000/api";
const CART_API = `${API}/carts`;
const CHECKOUT_API = `${API}/checkout`;
const STRIPE_API = `${API}/payments/create-payment-intent`;

const token = localStorage.getItem("token");

// Stripe initialization
const stripe = Stripe("pk_test_51T3YGjPubxVvHrmFHvOK8ut1lXw8X7nL77iYk0Y47aj4G6758ndZDGRnWu54qEuv2mk3feOfbRNTKZmwRe9A8Cbx00VNTxBm5d");

const elements = stripe.elements();
const card = elements.create("card");

let cartItems = [];
let totalAmount = 0;

// DOM elements
const placeOrderBtn = document.getElementById("placeOrderBtn");
const errorBox = document.getElementById("errorBox");
const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const cityInput = document.getElementById("city");
const zipInput = document.getElementById("zip");
const addressInput = document.getElementById("address");
const paymentMethodSelect = document.getElementById("payment_method");
const cardContainer = document.getElementById("card-container");

// Helper: show error message
function showError(message) {
  errorBox.innerText = message;
  errorBox.style.display = "block";
  // auto hide after 5 seconds
  setTimeout(() => {
    if (errorBox.innerText === message) {
      errorBox.style.display = "none";
    }
  }, 5000);
}

function hideError() {
  errorBox.style.display = "none";
  errorBox.innerText = "";
}

// Helper: set button loading state
function setButtonLoading(isLoading, originalText = "Place Order") {
  if (isLoading) {
    // Disable button and show spinner + loading text
    placeOrderBtn.disabled = true;
    // Store original text if not already stored
    if (!placeOrderBtn.hasAttribute("data-original-text")) {
      placeOrderBtn.setAttribute("data-original-text", placeOrderBtn.innerText);
    }
    // Clear existing content and add spinner + text
    placeOrderBtn.innerHTML = '<span class="spinner"></span> Processing...';
  } else {
    // Re-enable and restore original text
    placeOrderBtn.disabled = false;
    const original = placeOrderBtn.getAttribute("data-original-text") || originalText;
    placeOrderBtn.innerHTML = original;
    placeOrderBtn.removeAttribute("data-original-text");
  }
}

// ================= CART LOAD =================
async function loadCart() {
  if (!token) {
    document.getElementById("cartContainer").innerHTML = 
      '<div class="cart-item"><span>🔐 Login required to view cart</span></div>';
    document.getElementById("totalBox").innerText = "Total: $0.00";
    return;
  }

  try {
    let res = await fetch(CART_API, {
      headers: { "Authorization": "Bearer " + token }
    });

    let data = await res.json();
    cartItems = data.data || data || [];

    let container = document.getElementById("cartContainer");
    container.innerHTML = "";
    totalAmount = 0;

    if (!cartItems.length) {
      container.innerHTML = '<div class="cart-item"><span>✨ Your cart is empty</span></div>';
      document.getElementById("totalBox").innerText = "Total: $0.00";
      return;
    }

    cartItems.forEach(item => {
      if (!item.plant) return;
      let price = (item.plant?.price ?? 0) * (item.quantity ?? 0);
      totalAmount += price;
      container.innerHTML += `
        <div class="cart-item">
          <span>🌿 ${escapeHtml(item.plant?.name ?? 'Deleted Product')} x ${item.quantity}</span>
          <span>$${price.toFixed(2)}</span>
        </div>
      `;
    });

    document.getElementById("totalBox").innerHTML = 
      `<span>Total: $${totalAmount.toFixed(2)}</span>`;
  } catch (err) {
    console.error("Cart load error:", err);
    document.getElementById("cartContainer").innerHTML = 
      '<div class="cart-item"><span>⚠️ Failed to load cart</span></div>';
  }
}

// simple escape helper
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// ================= PAYMENT TOGGLE =================
let cardMounted = false;

paymentMethodSelect.addEventListener("change", function () {
  if (this.value === "card") {
    cardContainer.style.display = "block";
    if (!cardMounted) {
      card.mount("#card-element");
      cardMounted = true;
    }
  } else {
    cardContainer.style.display = "none";
  }
});

// ================= PLACE ORDER WITH LOADING STATE =================
async function placeOrder() {
  // Reset any previous error and hide error box
  hideError();

  // ========== 1. VALIDATION (basic) ==========
  if (!cartItems.length) {
    showError("🛒 Cart is empty. Add some items before checkout.");
    return;
  }

  const name = nameInput.value.trim();
  const phone = phoneInput.value.trim();
  const city = cityInput.value.trim();
  const zip = zipInput.value.trim();
  const shippingAddress = addressInput.value.trim();

  if (!name || !phone || !city || !zip || !shippingAddress) {
    showError("❌ Please fill all shipping fields (Name, Phone, City, Zip, Address).");
    return;
  }

  // Optional: phone simple validation (basic)
  if (phone.length < 5) {
    showError("📞 Please enter a valid phone number.");
    return;
  }

  const paymentMethod = paymentMethodSelect.value;

  let payload = {
    name: name,
    phone: phone,
    city: city,
    zip: zip,
    shipping_address: shippingAddress,
    payment_method: paymentMethod,
    payment_id: null
  };

  // Activate loading UI (disable button + spinner)
  setButtonLoading(true, "Place Order");

  try {
    // ========== 2. STRIPE CARD HANDLING (if card selected) ==========
    if (paymentMethod === "card") {
      // Double-check that card element is mounted
      if (!cardMounted) {
        card.mount("#card-element");
        cardMounted = true;
      }
      
      // Create payment method from card element
      const { error: pmError, paymentMethod: stripePaymentMethod } = 
        await stripe.createPaymentMethod({
          type: "card",
          card: card,
        });

      if (pmError) {
        throw new Error(pmError.message);
      }

      // Request payment intent from backend
      const intentResponse = await fetch(STRIPE_API, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ amount: totalAmount })
      });

      const intentText = await intentResponse.text();
      let intentData;
      try {
        intentData = JSON.parse(intentText);
      } catch (e) {
        throw new Error("Invalid response from payment server: " + intentText.slice(0, 100));
      }

      if (!intentData.clientSecret) {
        throw new Error("Stripe payment intent creation failed. Missing client secret.");
      }

      // Confirm card payment
      const { error: confirmError, paymentIntent } = 
        await stripe.confirmCardPayment(intentData.clientSecret, {
          payment_method: {
            card: card
          }
        });

      if (confirmError) {
        throw new Error(confirmError.message);
      }

      payload.payment_id = paymentIntent.id;
    }

    // ========== 3. SUBMIT ORDER TO BACKEND ==========
    const checkoutRes = await fetch(CHECKOUT_API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify(payload)
    });

    const responseText = await checkoutRes.text();
    let responseData;
    try {
      responseData = JSON.parse(responseText);
    } catch (e) {
      throw new Error("Server response error: " + responseText.slice(0, 150));
    }

    if (!checkoutRes.ok) {
      throw new Error(responseData.message || "Checkout failed. Please try again.");
    }

    // Success! 🎉
    alert("✅ Order placed successfully! Thank you for shopping with GreenNest.");
    window.location.href = "thankyou.html";

  } catch (err) {
    console.error("Checkout error:", err);
    showError(err.message || "Something went wrong. Please check your details and try again.");
    // Re-enable button & remove loading spinner
    setButtonLoading(false);
    // IMPORTANT: we must not redirect, so stop further execution
    return;
  }

  // If everything succeeded (redirect happens), we don't need to reset button because page unloads.
  // But if redirect somehow fails, we reset anyway for safety (code after redirect won't run)
  setButtonLoading(false);
}

// Attach event listener to the button (instead of inline onclick for cleaner loading control)
placeOrderBtn.addEventListener("click", (e) => {
  e.preventDefault();
  placeOrder();
});

// ================= ADDITIONAL: Reset loading on page before unload (optional) =================
window.addEventListener("beforeunload", () => {
  if (placeOrderBtn.disabled) {
    // ensure no side effects
    placeOrderBtn.disabled = false;
  }
});

// ================= INITIALIZE PAGE =================
(async function init() {
  await loadCart();
  // Pre-setup: if card was never mounted, we only mount when needed
  // but for safety, check if card method selected by default? Not needed.
  // Also ensure if payment_method initially "cod", card container hidden.
  if (paymentMethodSelect.value !== "card") {
    cardContainer.style.display = "none";
  } else {
    cardContainer.style.display = "block";
    if (!cardMounted) {
      card.mount("#card-element");
      cardMounted = true;
    }
  }
})();
</script>

</body>
</html>
