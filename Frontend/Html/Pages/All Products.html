<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Products</title>
 
 <style>
    /* ============================================
   ALL PRODUCTS PAGE - GREENNEST MODERN STYLES
   Full product grid | Premium botanical UI
   Fonts: Inter + Outfit | Responsive & smooth
   ============================================ */

/* ---------- IMPORT MODERN FONTS ---------- */
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Outfit:wght@400;500;600;700;800&display=swap');

/* ---------- CSS VARIABLES (Fresh Green Theme) ---------- */
:root {
  --primary-dark: #1A3A2E;
  --primary-green: #2C7A47;
  --primary-soft: #9DC3A2;
  --primary-light: #E9F3EB;
  --bg-white: #FFFFFF;
  --bg-page: #F8FBF9;
  --text-dark: #1E2F2A;
  --text-muted: #5C6F66;
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 8px 20px rgba(44, 122, 71, 0.06);
  --shadow-lg: 0 12px 28px rgba(0, 0, 0, 0.08);
  --shadow-hover: 0 18px 30px rgba(44, 122, 71, 0.12);
  --radius-card: 20px;
  --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

/* ---------- GLOBAL RESET ---------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', 'Outfit', system-ui, -apple-system, sans-serif;
  background-color: var(--bg-page);
  color: var(--text-dark);
  line-height: 1.5;
  font-size: 15px;
}

/* ---------- MAIN CONTAINER ---------- */
.main-all-products {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 2rem 3rem;
}

/* ---------- NAV-BAR STYLES (from the provided structure) ---------- */
.nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  background: var(--bg-white);
  padding: 1rem 1.5rem;
  margin: 1rem 0 2rem 0;
  border-radius: 60px;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(157, 195, 162, 0.3);
  font-family: 'Inter', sans-serif;
}

.nav-bar h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary-green));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin: 0;
  transition: var(--transition);
}

.nav-bar h1:hover {
  transform: scale(1.02);
}

.nav-bar div {
  display: flex;
  gap: 1.5rem;
  align-items: center;
}

.nav-bar div a {
  text-decoration: none;
  font-weight: 600;
  font-size: 1rem;
  color: var(--text-dark);
  padding: 0.5rem 0;
  transition: var(--transition);
  position: relative;
}

.nav-bar div a::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--primary-green);
  transition: width 0.25s ease;
  border-radius: 2px;
}

.nav-bar div a:hover::after {
  width: 100%;
}

.nav-bar div a:hover {
  color: var(--primary-green);
}

/* ---------- PRODUCT GRID CONTAINER ---------- */
.product-content {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 2rem;
  margin-top: 1rem;
}

/* ---------- PRODUCT CARD ---------- */
.product-card {
  background: var(--bg-white);
  border-radius: var(--radius-card);
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  border: 1px solid rgba(157, 195, 162, 0.25);
  display: flex;
  flex-direction: column;
}

.product-card:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow-hover);
  border-color: var(--primary-soft);
}

/* image */
.product-card img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  background-color: var(--primary-light);
  transition: transform 0.4s ease;
}

.product-card:hover img {
  transform: scale(1.02);
}

/* product name */
.product-card h3 {
  font-family: 'Outfit', 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1.2rem;
  letter-spacing: -0.02em;
  color: var(--text-dark);
  margin: 1rem 1rem 0.35rem;
  line-height: 1.3;
  transition: color 0.2s;
}

.product-card:hover h3 {
  color: var(--primary-green);
}

/* price */
.product-card .price {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 1.3rem;
  color: var(--primary-green);
  margin: 0 1rem 0.5rem;
}

/* description */
.product-card p:last-of-type {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin: 0 1rem 1.25rem;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ---------- LOADING / EMPTY STATE ---------- */
.product-content:empty::before {
  content: "🌿 Loading plants...";
  display: block;
  text-align: center;
  font-size: 1.2rem;
  color: var(--text-muted);
  padding: 3rem;
  grid-column: 1 / -1;
  font-weight: 500;
}

/* ---------- RESPONSIVE DESIGN ---------- */
@media (max-width: 900px) {
  .main-all-products {
    padding: 0 1.5rem 2rem;
  }
  .product-content {
    gap: 1.5rem;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  }
  .nav-bar {
    padding: 0.8rem 1.2rem;
  }
  .nav-bar h1 {
    font-size: 1.5rem;
  }
}

@media (max-width: 640px) {
  .main-all-products {
    padding: 0 1rem 1.5rem;
  }
  .product-content {
    gap: 1rem;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  }
  .product-card h3 {
    font-size: 1rem;
    margin: 0.75rem 0.75rem 0.25rem;
  }
  .product-card .price {
    font-size: 1.1rem;
    margin: 0 0.75rem 0.25rem;
  }
  .product-card p:last-of-type {
    font-size: 0.75rem;
    margin: 0 0.75rem 1rem;
  }
  .nav-bar {
    flex-direction: column;
    gap: 0.8rem;
    text-align: center;
    border-radius: 30px;
  }
  .nav-bar div {
    gap: 1.2rem;
  }
}

@media (max-width: 480px) {
  .product-content {
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
  }
  .product-card h3 {
    font-size: 0.85rem;
  }
  .product-card .price {
    font-size: 0.95rem;
  }
  .nav-bar div a {
    font-size: 0.9rem;
  }
}

/* ---------- ACCESSIBILITY & FOCUS ---------- */
.product-card:focus-visible {
  outline: 3px solid var(--primary-green);
  outline-offset: 2px;
  border-radius: var(--radius-card);
}

.nav-bar a:focus-visible,
.nav-bar button:focus-visible {
  outline: 2px solid var(--primary-green);
  outline-offset: 2px;
  border-radius: 30px;
}

/* ---------- CUSTOM SCROLLBAR ---------- */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: var(--primary-light);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: var(--primary-soft);
  border-radius: 10px;
}
 </style>
</head>
<body>

<div class="main-all-products">

     <!-- NAV BAR -->
    <div class="nav-bar">
        <h1>GreenNest</h1>

        <div>
            <a href="../index.html">Home</a>
            <a href="../Pages/Cart.html">Cart</a>
        </div>
    </div>

    <div class="product-content" id="productContent">
        <!-- products here -->
    </div>

</div>

<script>
const API = "http://127.0.0.1:8000/api/plants";

// 🔥 LOAD PRODUCTS
loadProducts();

async function loadProducts() {

    try {
        const res = await fetch(API, {
            headers: {
                "Accept": "application/json"
            }
        });

        const data = await res.json();

        const container = document.getElementById("productContent");
        container.innerHTML = "";

        data.forEach(p => {

            const card = document.createElement("div");
card.className = "product-card";

card.onclick = () => {
    window.location.href = `Product details.html?id=${p.plant_id}`;
};

            let img = p.image 
                ? `http://127.0.0.1:8000/storage/${p.image}`
                : "https://via.placeholder.com/300";

            card.innerHTML = `
                <img src="${img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p class="price">$${p.price}</p>
                <p>${p.description || ""}</p>
            `;

            container.appendChild(card);
        });

    } catch (error) {
        console.log("Error loading products:", error);
    }
}
</script>

</body>
</html>
