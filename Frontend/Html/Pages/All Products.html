<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Products</title>
<style>
    /* ==============================================
   ALL PRODUCTS PAGE – COMPLETE DETAILED STYLES
   Green theme, product grid, card hover effects
================================================= */

/* ----- RESET & BASE ----- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #fafef7 0%, #e8f5e9 100%);
    color: #1e2f1e;
    line-height: 1.5;
    min-height: 100vh;
}

/* ----- MAIN CONTAINER ----- */
.main-all-products {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1rem 2rem;
    animation: fadeIn 0.5s ease;
}

/* ========== NAVBAR STYLES (even if empty, styled placeholder) ========== */
.nav-bar {
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(12px);
    border-radius: 60px;
    padding: 0.8rem 1.5rem;
    margin-bottom: 2rem;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
    border: 1px solid rgba(46, 125, 50, 0.15);
    /* You can later add logo/links – this keeps it visible */
    min-height: 70px;
}

/* If you add content inside .nav-bar later, it will look clean */
.nav-bar:empty::before {
    content: "🌿 GreenNest 🌱";
    display: block;
    text-align: center;
    font-size: 1.3rem;
    font-weight: 600;
    background: linear-gradient(135deg, #2e7d32, #6b8c42);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    letter-spacing: -0.3px;
}

/* ========== PRODUCT GRID (dynamic content) ========== */
.product-content {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2rem;
    padding: 0.5rem 0 2rem;
}

/* ----- PRODUCT CARD ----- */
.product-card {
    background: white;
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(107, 140, 66, 0.15);
    position: relative;
}

.product-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.2);
    border-color: rgba(46, 125, 50, 0.3);
}

/* Image area */
.product-card img {
    width: 100%;
    height: 240px;
    object-fit: cover;
    transition: transform 0.5s;
    background: #f5f7f2;
}

.product-card:hover img {
    transform: scale(1.03);
}

/* Product title */
.product-card h3 {
    font-size: 1.3rem;
    font-weight: 600;
    color: #1b5e20;
    margin: 1rem 1rem 0.4rem;
    line-height: 1.3;
}

/* Price */
.product-card .price {
    font-size: 1.5rem;
    font-weight: 700;
    color: #2e7d32;
    margin: 0 1rem 0.5rem;
}

/* Description (truncated gracefully) */
.product-card p:not(.price) {
    font-size: 0.85rem;
    color: #4a5b4a;
    margin: 0 1rem 1rem;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* Optional add-to-cart indicator on hover (just for style) */
.product-card::after {
    content: "🌱 View Details";
    position: absolute;
    bottom: -40px;
    left: 0;
    right: 0;
    background: #2e7d32;
    color: white;
    text-align: center;
    padding: 8px;
    font-size: 0.8rem;
    font-weight: 500;
    transition: bottom 0.3s ease;
    border-radius: 0 0 32px 32px;
}

.product-card:hover::after {
    bottom: 0;
}

/* ----- RESPONSIVE BREAKPOINTS ----- */
@media (max-width: 850px) {
    .main-all-products {
        padding: 1rem;
    }

    .product-content {
        gap: 1.5rem;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }

    .product-card img {
        height: 200px;
    }

    .product-card h3 {
        font-size: 1.1rem;
    }

    .product-card .price {
        font-size: 1.2rem;
    }
}

@media (max-width: 550px) {
    .main-all-products {
        padding: 0.8rem;
    }

    .product-content {
        gap: 1rem;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }

    .product-card img {
        height: 160px;
    }

    .product-card h3 {
        font-size: 1rem;
        margin: 0.7rem 0.7rem 0.2rem;
    }

    .product-card .price {
        font-size: 1.1rem;
        margin: 0 0.7rem 0.3rem;
    }

    .product-card p:not(.price) {
        font-size: 0.75rem;
        margin: 0 0.7rem 0.7rem;
    }

    .product-card::after {
        font-size: 0.7rem;
        padding: 6px;
    }
}

/* ----- ANIMATIONS ----- */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Custom scrollbar */
body::-webkit-scrollbar {
    width: 8px;
}
body::-webkit-scrollbar-track {
    background: #e0e8e0;
    border-radius: 10px;
}
body::-webkit-scrollbar-thumb {
    background: #2e7d32;
    border-radius: 10px;
}
</style>
 
</head>
<body>

<div class="main-all-products">

    <div class="nav-bar"></div>

    <div class="product-content" id="productContent">
        <!-- products here -->
    </div>

</div>

<script>
const API = "http://127.0.0.1:8000/api/plants";

// 🔥 LOAD PRODUCTS
loadProducts();

async function loadProducts() {

    try {
        const res = await fetch(API, {
            headers: {
                "Accept": "application/json"
            }
        });

        const data = await res.json();

        const container = document.getElementById("productContent");
        container.innerHTML = "";

        data.forEach(p => {

            const card = document.createElement("div");
card.className = "product-card";

card.onclick = () => {
    window.location.href = `Product details.html?id=${p.plant_id}`;
};

            let img = p.image 
                ? `http://127.0.0.1:8000/storage/${p.image}`
                : "https://via.placeholder.com/300";

            card.innerHTML = `
                <img src="${img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p class="price">$${p.price}</p>
                <p>${p.description || ""}</p>
            `;

            container.appendChild(card);
        });

    } catch (error) {
        console.log("Error loading products:", error);
    }
}
</script>

</body>
</html>
