<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Details</title>
 <style>/* ==============================================
   PRODUCT DETAILS PAGE – COMPLETE CSS
   Green theme, glassmorphism, responsive layout
================================================= */

/* ----- RESET & BASE ----- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #fafef7 0%, #e8f5e9 100%);
    color: #1e2f1e;
    line-height: 1.5;
    min-height: 100vh;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* ----- MAIN CONTAINER (glassmorphism card) ----- */
.container {
    max-width: 900px;
    width: 100%;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    border-radius: 48px;
    padding: 2rem;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.02);
    transition: transform 0.3s, box-shadow 0.3s;
    margin-bottom: 1.5rem;
    animation: fadeSlideUp 0.5s ease;
}

.container:hover {
    transform: translateY(-3px);
    box-shadow: 0 28px 45px rgba(0, 0, 0, 0.12);
}

/* Product image */
.container img {
    width: 100%;
    max-height: 400px;
    object-fit: cover;
    border-radius: 32px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    margin-bottom: 1.5rem;
    border: 1px solid rgba(107, 140, 66, 0.2);
}

/* Product name */
.container h2 {
    font-size: 2rem;
    font-weight: 700;
    color: #1b5e20;
    margin-bottom: 0.5rem;
    letter-spacing: -0.3px;
}

/* Price */
.container .price {
    font-size: 2rem;
    font-weight: 800;
    color: #2e7d32;
    margin-bottom: 1rem;
    background: #e8f5e9;
    display: inline-block;
    padding: 0.2rem 1rem;
    border-radius: 60px;
}

/* Stock info */
.container p b {
    color: #2e7d32;
}

.container p {
    font-size: 1rem;
    margin: 0.8rem 0;
    color: #2d3e2d;
}

/* Description */
.container p:last-of-type {
    margin-bottom: 1.8rem;
    line-height: 1.6;
}

/* Add to cart button */
.container button {
    background: linear-gradient(135deg, #2e7d32, #1b5e20);
    border: none;
    color: white;
    padding: 14px 32px;
    border-radius: 60px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    width: 100%;
    font-family: inherit;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.container button::before {
    content: "🛒";
    font-size: 1.2rem;
}

.container button:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #1b5e20, #0f3b0f);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
}

/* ----- CART LINK (outside container) ----- */
a[href="./Cart.html"] {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    background: white;
    color: #2e7d32;
    padding: 12px 24px;
    border-radius: 60px;
    font-weight: 600;
    transition: all 0.2s;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    border: 1px solid #c8e6c9;
    margin-top: 0.5rem;
}

a[href="./Cart.html"]::before {
    content: "🛍️";
    font-size: 1rem;
}

a[href="./Cart.html"]:hover {
    background: #2e7d32;
    color: white;
    transform: translateY(-2px);
    border-color: #2e7d32;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
}

/* ----- RESPONSIVE (mobile) ----- */
@media (max-width: 680px) {
    body {
        padding: 1rem;
    }

    .container {
        padding: 1.2rem;
        border-radius: 32px;
    }

    .container h2 {
        font-size: 1.5rem;
    }

    .container .price {
        font-size: 1.5rem;
    }

    .container img {
        max-height: 280px;
    }

    .container button {
        padding: 12px 20px;
    }

    a[href="./Cart.html"] {
        padding: 10px 18px;
        font-size: 0.9rem;
    }
}

/* Extra small */
@media (max-width: 480px) {
    .container h2 {
        font-size: 1.3rem;
    }

    .container .price {
        font-size: 1.2rem;
    }

    .container p {
        font-size: 0.9rem;
    }
}

/* ----- ANIMATIONS ----- */
@keyframes fadeSlideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Custom scrollbar */
body::-webkit-scrollbar {
    width: 8px;
}
body::-webkit-scrollbar-track {
    background: #e0e8e0;
    border-radius: 10px;
}
body::-webkit-scrollbar-thumb {
    background: #2e7d32;
    border-radius: 10px;
}</style>

</head>
<body>

<div class="container" id="productDetail">
    Loading...
</div>
<a href="./Cart.html">cart</a>

<script>

const API = "http://127.0.0.1:8000/api/plants";
const token = localStorage.getItem("token");

// get id from URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

loadProduct();

async function loadProduct() {

    const res = await fetch(`${API}/${id}`, {
        headers: {
            "Accept": "application/json"
        }
    });

    const p = await res.json();

    const container = document.getElementById("productDetail");

    container.innerHTML = `
        <img src="http://127.0.0.1:8000/storage/${p.image}" />
        <h2>${p.name}</h2>
        <p class="price">$${p.price}</p>
        <p><b>Stock:</b> ${p.stock_quantity}</p>
        <p>${p.description || ""}</p>

        <button onclick="addToCart(${p.plant_id})">Add to Cart</button>
    `;
}

// 🔥 ADD TO CART FUNCTION
async function addToCart(plantId) {

    if (!token) {
        alert("Login required!");
        window.location.href = "../Auth/Login.html";
        return;
    }

    try {
        let res = await fetch("http://127.0.0.1:8000/api/carts", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ 
                plant_id: plantId,
                quantity: 1
            })
        });

        let data = await res.json();

        if (res.ok) {
            alert("Added to cart ✔");
        } else {
            alert("Error: " + JSON.stringify(data));
        }

    } catch (error) {
        console.log(error);
        alert("Server error");
    }
}

</script>

</body>
</html>
