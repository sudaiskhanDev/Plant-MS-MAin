<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Details</title>

 <style>
        /* ============================================
           GREENNEST DESIGN TOKENS
           ============================================ */
        :root {
            --primary: #76A845;
            --primary-hover: #5E8C33;
            --soft-mint: #BCE7B8;
            --header-glow: #E8F5E9;
            --clean-base: #FFFFFF;
            --core-text: #1A1A1A;
            --text-muted: #4A4A4A;
            --accent-gold: #C6A56A;   /* kept from original, but now as a secondary accent */

            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-btn: 20px;

            --shadow-card: 0 8px 24px rgba(26, 26, 26, 0.06);
            --shadow-btn: 0 6px 14px rgba(118, 168, 69, 0.3);
        }

        /* ============================================
           RESET & BASE
           ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--header-glow) 0%, var(--clean-base) 100%);
            color: var(--core-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* ============================================
           PRODUCT CARD / CONTAINER
           ============================================ */
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--clean-base);
            border-radius: var(--radius-lg);
            padding: 36px 32px;
            box-shadow: var(--shadow-card);
            text-align: center;
        }

        /* Loading / empty text */
        .container:empty::after,
        .container:not(:has(img)) {
            content: "Loading plant details… 🌿";
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        /* ============================================
           PRODUCT IMAGE
           ============================================ */
        .container img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            border: 2px solid var(--soft-mint);
            background: var(--header-glow); /* soft background if image has transparency */
        }

        /* ============================================
           TEXT STYLES
           ============================================ */
        .container h2 {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: var(--core-text);
        }

        .container .price {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);   /* Primary green instead of gold – or you can keep #C6A56A */
            margin-bottom: 12px;
        }

        .container p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .container p b {
            color: var(--core-text);
            font-weight: 600;
        }

        /* Description block */
        .container .description {
            font-style: italic;
            color: var(--text-muted);
            margin: 16px 0 24px;
        }

        /* ============================================
           ADD TO CART BUTTON (High-contrast CTA)
           ============================================ */
        .container button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: var(--clean-base);
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            border: none;
            border-radius: var(--radius-btn);
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            margin-top: 8px;
        }

        .container button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-btn);
        }

        .container button:active {
            transform: translateY(0);
        }

        .container button:focus-visible {
            outline: 3px dashed var(--primary);
            outline-offset: 3px;
        }

        /* ============================================
           CART LINK (styled as a secondary button)
           ============================================ */
        .cart-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--soft-mint);
            border-radius: var(--radius-btn);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .cart-link:hover {
            background-color: var(--soft-mint);
            color: var(--core-text);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(118, 168, 69, 0.15);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            .container {
                padding: 24px 20px;
            }
            .container h2 {
                font-size: 1.5rem;
            }
        }
    </style>

</head>
<body>

<div class="container" id="productDetail">
    Loading...
</div>
<a href="./Cart.html">cart</a>

<script>

const API = "http://127.0.0.1:8000/api/plants";
const token = localStorage.getItem("token");

// get id from URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

loadProduct();

async function loadProduct() {

    const res = await fetch(`${API}/${id}`, {
        headers: {
            "Accept": "application/json"
        }
    });

    const p = await res.json();

    const container = document.getElementById("productDetail");

    container.innerHTML = `
        <img src="http://127.0.0.1:8000/storage/${p.image}" />
        <h2>${p.name}</h2>
        <p class="price">$${p.price}</p>
        <p><b>Stock:</b> ${p.stock_quantity}</p>
        <p>${p.description || ""}</p>

        <button onclick="addToCart(${p.plant_id})">Add to Cart</button>
    `;
}

// 🔥 ADD TO CART FUNCTION
async function addToCart(plantId) {

    if (!token) {
        alert("Login required!");
        window.location.href = "../Auth/Login.html";
        return;
    }

    try {
        let res = await fetch("http://127.0.0.1:8000/api/carts", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ 
                plant_id: plantId,
                quantity: 1
            })
        });

        let data = await res.json();

        if (res.ok) {
            alert("Added to cart ✔");
        } else {
            alert("Error: " + JSON.stringify(data));
        }

    } catch (error) {
        console.log(error);
        alert("Server error");
    }
}

</script>

</body>
</html>
