<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Details</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: #C6A56A;
    font-size: 20px;
    font-weight: bold;
}

button {
    background: #1b3022;
    color: white;
    padding: 10px;
    border: none;
    width: 100%;
    margin-top: 15px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #344e41;
}
</style>

</head>
<body>

<div class="container" id="productDetail">
    Loading...
</div>
<a href="./Cart.html">cart</a>

<script>

const API = "http://127.0.0.1:8000/api/plants";
const token = localStorage.getItem("token");

// get id from URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

loadProduct();

async function loadProduct() {

    const res = await fetch(`${API}/${id}`, {
        headers: {
            "Accept": "application/json"
        }
    });

    const p = await res.json();

    const container = document.getElementById("productDetail");

    container.innerHTML = `
        <img src="http://127.0.0.1:8000/storage/${p.image}" />
        <h2>${p.name}</h2>
        <p class="price">$${p.price}</p>
        <p><b>Stock:</b> ${p.stock_quantity}</p>
        <p>${p.description || ""}</p>

        <button onclick="addToCart(${p.plant_id})">Add to Cart</button>
    `;
}

// 🔥 ADD TO CART FUNCTION
async function addToCart(plantId) {

    if (!token) {
        alert("Login required!");
        window.location.href = "../Auth/Login.html";
        return;
    }

    try {
        let res = await fetch("http://127.0.0.1:8000/api/carts", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ 
                plant_id: plantId,
                quantity: 1
            })
        });

        let data = await res.json();

        if (res.ok) {
            alert("Added to cart ✔");
        } else {
            alert("Error: " + JSON.stringify(data));
        }

    } catch (error) {
        console.log(error);
        alert("Server error");
    }
}

</script>

</body>
</html>
