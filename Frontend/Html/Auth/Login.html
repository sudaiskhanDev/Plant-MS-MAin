<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        /* ==============================================
   GREENNEST LOGIN PAGE – COMPLETE CSS
   Glassmorphism, nature-inspired, responsive
================================================= */

/* ----- RESET & BASE ----- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1.5rem;
    position: relative;
    overflow-x: hidden;
}

/* Decorative leaf background (subtle) */
body::before {
    content: "🌿🌱🌿";
    position: absolute;
    bottom: 20px;
    left: 20px;
    font-size: 3rem;
    opacity: 0.08;
    white-space: pre;
    pointer-events: none;
}

body::after {
    content: "🍃🌿🍃";
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 2.5rem;
    opacity: 0.08;
    pointer-events: none;
}

/* ----- MAIN CARD (Glassmorphism) ----- */
.login-container {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(14px);
    border-radius: 48px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.05);
    transition: transform 0.3s, box-shadow 0.3s;
    border: 1px solid rgba(46, 125, 50, 0.2);
    animation: fadeSlideUp 0.5s ease;
}

.login-container:hover {
    transform: translateY(-5px);
    box-shadow: 0 35px 55px rgba(0, 0, 0, 0.15);
}

/* ----- HEADLINE ----- */
h2 {
    font-size: 2rem;
    font-weight: 700;
    color: #2e7d32;
    margin-bottom: 1.8rem;
    text-align: center;
    letter-spacing: -0.3px;
    position: relative;
}

h2::after {
    content: "";
    display: block;
    width: 70px;
    height: 3px;
    background: linear-gradient(90deg, #6b8c42, #2e7d32);
    margin: 8px auto 0;
    border-radius: 4px;
}

/* ----- INPUT FIELDS ----- */
input {
    width: 100%;
    padding: 14px 18px;
    margin: 10px 0;
    border: 1px solid #d0e2c0;
    border-radius: 56px;
    background: #fefef7;
    font-size: 1rem;
    transition: all 0.2s;
    font-family: inherit;
}

input:focus {
    outline: none;
    border-color: #2e7d32;
    box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
    background: white;
}

input::placeholder {
    color: #9bbf8f;
    font-weight: 400;
}

/* ----- LOGIN BUTTON ----- */
button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #2e7d32, #1b5e20);
    color: white;
    border: none;
    border-radius: 56px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    transition: all 0.3s;
    margin-top: 15px;
    font-family: inherit;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

button::before {
    content: "🌱";
    font-size: 1.1rem;
    transition: transform 0.2s;
}

button:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #1b5e20, #0f3b0f);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
}

button:hover::before {
    transform: rotate(15deg);
}

/* ----- MESSAGE (error/success) ----- */
#msg {
    margin-top: 1rem;
    padding: 8px 12px;
    border-radius: 40px;
    text-align: center;
    font-size: 0.85rem;
    font-weight: 500;
    background: #ffefef;
    color: #c62828;
    transition: all 0.2s;
}

/* Success state (will be applied by JS later if needed) */
#msg:contains("successful") {
    background: #e8f5e9;
    color: #2e7d32;
}

/* ----- REGISTER LINK ----- */
.register-link {
    margin-top: 1.8rem;
    text-align: center;
    font-size: 0.9rem;
    color: #4a5b4a;
}

.register-link a {
    color: #2e7d32;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.2s;
    position: relative;
}

.register-link a::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 2px;
    background: #2e7d32;
    transition: width 0.2s;
}

.register-link a:hover {
    color: #1b5e20;
}

.register-link a:hover::after {
    width: 100%;
}

/* ----- RESPONSIVE (mobile) ----- */
@media (max-width: 520px) {
    body {
        padding: 1rem;
    }
    .login-container {
        padding: 1.8rem 1.2rem;
        border-radius: 32px;
    }
    h2 {
        font-size: 1.6rem;
    }
    input {
        padding: 12px 16px;
    }
    button {
        padding: 12px;
    }
}

/* ----- ANIMATIONS ----- */
@keyframes fadeSlideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ----- CUSTOM SCROLLBAR ----- */
body::-webkit-scrollbar {
    width: 8px;
}
body::-webkit-scrollbar-track {
    background: #e0e8e0;
    border-radius: 10px;
}
body::-webkit-scrollbar-thumb {
    background: #2e7d32;
    border-radius: 10px;
}
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login to GreenNest</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p id="msg"></p>
    <div class="register-link">
        Don't have an account? <a href="Register.html">Register here</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    let email = document.getElementById('email').value;
    let password = document.getElementById('password').value;

    try {
        let response = await fetch('http://127.0.0.1:8000/api/user/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        let data = await response.json();

        if (response.ok) {
            // token save
            localStorage.setItem('token', data.access_token);

            document.getElementById('msg').innerText = "Login successful ✔";

            // redirect
            window.location.href = "../index.html";
        } else {
            document.getElementById('msg').innerText = data.error || "Login failed";
        }

    } catch (error) {
        document.getElementById('msg').innerText = "Server error";
    }
});
</script>

</body>
</html>
