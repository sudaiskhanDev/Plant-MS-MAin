<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
   
    <style>
        /* ============================================
   LOGIN PAGE - GREENNEST MODERN STYLES
   Botanical fresh theme | Clean auth form
   Fonts: Inter + Outfit | Responsive & smooth
   ============================================ */

/* ---------- IMPORT MODERN FONTS ---------- */
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Outfit:wght@400;500;600;700;800&display=swap');

/* ---------- CSS VARIABLES (Fresh Green Palette) ---------- */
:root {
  --primary-dark: #1A3A2E;
  --primary-green: #2C7A47;
  --primary-soft: #9DC3A2;
  --primary-light: #E9F3EB;
  --bg-white: #FFFFFF;
  --bg-page: #F8FBF9;
  --text-dark: #1E2F2A;
  --text-muted: #5C6F66;
  --text-light: #8A9C91;
  --error-red: #E53E3E;
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 8px 20px rgba(44, 122, 71, 0.06);
  --shadow-lg: 0 12px 28px rgba(0, 0, 0, 0.08);
  --shadow-hover: 0 18px 30px rgba(44, 122, 71, 0.12);
  --radius-card: 28px;
  --radius-input: 14px;
  --radius-btn: 50px;
  --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

/* ---------- GLOBAL RESET ---------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', 'Outfit', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, var(--bg-page) 0%, var(--primary-light) 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  margin: 0;
}

/* ---------- LOGIN CONTAINER (CARD) ---------- */
.login-container {
  max-width: 460px;
  width: 100%;
  background: var(--bg-white);
  border-radius: var(--radius-card);
  padding: 2.5rem 2rem 2.2rem;
  box-shadow: var(--shadow-lg);
  border: 1px solid rgba(157, 195, 162, 0.3);
  transition: var(--transition);
}

.login-container:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
}

/* ---------- HEADING ---------- */
.login-container h2 {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 1.9rem;
  letter-spacing: -0.02em;
  color: var(--primary-dark);
  text-align: center;
  margin-bottom: 2rem;
  position: relative;
}

/* decorative underline */
.login-container h2::after {
  content: '';
  display: block;
  width: 60px;
  height: 3px;
  background: var(--primary-green);
  border-radius: 10px;
  margin: 0.6rem auto 0;
}

/* ---------- FORM ---------- */
#loginForm {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

/* inputs */
#loginForm input {
  width: 100%;
  padding: 0.9rem 1.2rem;
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-dark);
  background: var(--bg-white);
  border: 1.5px solid var(--primary-light);
  border-radius: var(--radius-input);
  transition: var(--transition);
  outline: none;
}

#loginForm input:focus {
  border-color: var(--primary-green);
  box-shadow: 0 0 0 3px rgba(44, 122, 71, 0.1);
}

#loginForm input::placeholder {
  color: var(--text-light);
  font-weight: 400;
}

/* ---------- LOGIN BUTTON ---------- */
#loginForm button {
  background: var(--primary-green);
  color: white;
  border: none;
  width: 100%;
  padding: 0.9rem;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-radius: var(--radius-btn);
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 2px 8px rgba(44, 122, 71, 0.2);
  margin-top: 0.5rem;
}

#loginForm button:hover {
  background: var(--primary-dark);
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(44, 122, 71, 0.25);
}

#loginForm button:active {
  transform: translateY(0);
}

/* ---------- MESSAGE (error/success) ---------- */
#msg {
  text-align: center;
  font-size: 0.85rem;
  font-weight: 500;
  margin: 1rem 0 0.5rem;
  padding: 0.5rem;
  border-radius: 50px;
  background: var(--primary-light);
  color: var(--primary-dark);
}

#msg:empty {
  display: none;
}

/* error style (dynamically set by JS message content) */
#msg:contains("failed"),
#msg:contains("error"),
#msg:contains("Server") {
  background: #FEF5F3;
  color: var(--error-red);
  border-left: 3px solid var(--error-red);
}

/* ---------- REGISTER LINK ---------- */
.register-link {
  text-align: center;
  margin-top: 1.8rem;
  font-size: 0.9rem;
  color: var(--text-muted);
  border-top: 1px solid var(--primary-light);
  padding-top: 1.5rem;
}

.register-link a {
  color: var(--primary-green);
  text-decoration: none;
  font-weight: 700;
  transition: var(--transition);
  margin-left: 0.3rem;
}

.register-link a:hover {
  color: var(--primary-dark);
  text-decoration: underline;
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 520px) {
  body {
    padding: 1rem;
  }
  .login-container {
    padding: 1.8rem 1.5rem;
  }
  .login-container h2 {
    font-size: 1.6rem;
  }
  #loginForm input {
    padding: 0.75rem 1rem;
    font-size: 0.9rem;
  }
  #loginForm button {
    padding: 0.75rem;
    font-size: 0.9rem;
  }
  .register-link {
    font-size: 0.85rem;
  }
}

/* ---------- ACCESSIBILITY ---------- */
button:focus-visible,
input:focus-visible,
a:focus-visible {
  outline: 2px solid var(--primary-green);
  outline-offset: 2px;
  border-radius: 8px;
}

/* ---------- SCROLLBAR ---------- */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: var(--primary-light);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: var(--primary-soft);
  border-radius: 10px;
}
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login to GreenNest</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p id="msg"></p>
    <div class="register-link">
        Don't have an account? <a href="Register.html">Register here</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    let email = document.getElementById('email').value;
    let password = document.getElementById('password').value;

    try {
        let response = await fetch('http://127.0.0.1:8000/api/user/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        let data = await response.json();

        if (response.ok) {
            // token save
            localStorage.setItem('token', data.access_token);

            document.getElementById('msg').innerText = "Login successful ✔";

            // redirect
            window.location.href = "../index.html";
        } else {
            document.getElementById('msg').innerText = data.error || "Login failed";
        }

    } catch (error) {
        document.getElementById('msg').innerText = "Server error";
    }
});
</script>

</body>
</html>
