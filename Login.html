<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">

<style>/* login.css — Modern Minimalist Boutique Style */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --charcoal-green: #1B3022;
    --soft-sage: #A3B18A;
    --off-white: #F9FBF9;
    --slate: #344E41;
    --brass: #C6A56A;
    --error: #c96f6f;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(145deg, #E8EDE4 0%, var(--off-white) 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 1.5rem;
}

/* Main card */
.login-card {
    max-width: 420px;
    width: 100%;
    background: white;
    border-radius: 32px;
    padding: 2rem 2rem 2.2rem;
    box-shadow: 0 20px 35px -12px rgba(27, 48, 34, 0.12);
    transition: transform 0.2s ease;
    border: 1px solid rgba(163, 177, 138, 0.2);
}

.login-card:hover {
    transform: translateY(-3px);
}

/* Typography */
h2 {
    font-size: 1.9rem;
    font-weight: 500;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--charcoal-green) 0%, var(--slate) 100%);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 0.25rem;
}

.sub {
    color: var(--slate);
    font-size: 0.85rem;
    margin-bottom: 1.8rem;
    border-left: 3px solid var(--brass);
    padding-left: 0.75rem;
    opacity: 0.8;
}

/* Form fields */
.input-group {
    margin-bottom: 1.3rem;
}

label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--slate);
    margin-bottom: 0.4rem;
}

input {
    width: 100%;
    padding: 0.85rem 1rem;
    font-family: 'Inter', monospace;
    font-size: 0.95rem;
    border: 1.5px solid #E2E8E3;
    border-radius: 20px;
    background-color: var(--off-white);
    transition: all 0.2s;
    outline: none;
    color: var(--charcoal-green);
}

input:focus {
    border-color: var(--soft-sage);
    box-shadow: 0 0 0 3px rgba(163, 177, 138, 0.2);
    background-color: white;
}

/* Error messages */
.error {
    color: var(--error);
    font-size: 0.7rem;
    margin-top: 0.4rem;
    margin-left: 0.5rem;
    font-weight: 500;
}

/* Login button */
button {
    width: 100%;
    padding: 0.85rem;
    background: var(--charcoal-green);
    color: white;
    border: none;
    border-radius: 40px;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.25s ease;
    margin-top: 0.5rem;
    letter-spacing: 0.3px;
    box-shadow: 0 2px 6px rgba(27, 48, 34, 0.2);
}

button:hover {
    background: var(--slate);
    transform: scale(0.98);
    box-shadow: 0 4px 10px rgba(27, 48, 34, 0.15);
}

button:active {
    transform: scale(0.96);
}

/* Server error block */
#serverError {
    text-align: center;
    margin-top: 1.2rem;
    padding: 0.5rem;
    background: rgba(201, 111, 111, 0.05);
    border-radius: 40px;
}

/* Decorative accent */
.leaf-accent {
    height: 3px;
    width: 50px;
    background: var(--brass);
    margin: 1.2rem 0 0;
    border-radius: 4px;
    opacity: 0.6;
}

/* Responsive */
@media (max-width: 480px) {
    .login-card {
        padding: 1.5rem;
    }
    h2 {
        font-size: 1.6rem;
    }
}</style>
    <title>Login</title>

    
</head>
<body>

<div class="box">
    <h2>Login</h2>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email">
        <div id="emailError" class="error"></div>

        <input type="password" id="password" placeholder="Password">
        <div id="passwordError" class="error"></div>

        <button type="submit">Login</button>
    </form>

    <div id="serverError" class="error"></div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    let email = document.getElementById('email').value.trim();
    let password = document.getElementById('password').value.trim();

    let valid = true;

    // reset errors
    document.getElementById('emailError').innerText = "";
    document.getElementById('passwordError').innerText = "";
    document.getElementById('serverError').innerText = "";

    // validation
    if (email === "") {
        document.getElementById('emailError').innerText = "Email required";
        valid = false;
    }

    if (password === "") {
        document.getElementById('passwordError').innerText = "Password required";
        valid = false;
    }

    if (!valid) return;

    try {
        const response = await fetch("http://127.0.0.1:8000/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
            document.getElementById('serverError').innerText = data.error || "Login failed";
            return;
        }

        // save token + role
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("role", data.user.role);

        const role = data.user.role;

        // redirect
        if (role === "Admin") {
            window.location.href = "Admin/Html/Admin Dashboard.html";
        } 
        else if (role === "Staff") {
            window.location.href = "Staff/Html/Staff Dashboard.html";
        } 
        else {
            alert("Unknown role");
        }

    } catch (error) {
        document.getElementById('serverError').innerText = "Server error";
    }
});
</script>

</body>
</html>
