<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    
    <style>
        /* ==============================================
   LOGIN PAGE - PLANT NURSERY THEME
   Fresh green, glassmorphism, responsive
================================================= */

/* ----- RESET & BASE ----- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1.5rem;
    position: relative;
    overflow-x: hidden;
}

/* Decorative plant icons (subtle background) */
body::before {
    content: "🌿🌱🌿";
    position: absolute;
    bottom: 20px;
    left: 20px;
    font-size: 3rem;
    opacity: 0.1;
    white-space: pre;
    pointer-events: none;
}

body::after {
    content: "🍃🌿🍃";
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 2.5rem;
    opacity: 0.1;
    pointer-events: none;
}

/* ----- MAIN CARD (glassmorphism) ----- */
.box {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    border-radius: 48px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.05);
    transition: transform 0.3s, box-shadow 0.3s;
    border: 1px solid rgba(46, 125, 50, 0.2);
    animation: fadeSlideUp 0.5s ease;
}

.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 28px 48px rgba(0, 0, 0, 0.15);
}

/* Heading */
.box h2 {
    text-align: center;
    font-size: 2rem;
    font-weight: 600;
    color: #2e7d32;
    margin-bottom: 1.8rem;
    letter-spacing: -0.5px;
    position: relative;
    display: inline-block;
    width: 100%;
}

.box h2::after {
    content: "";
    display: block;
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #6b8c42, #2e7d32);
    margin: 8px auto 0;
    border-radius: 4px;
}

/* Form inputs */
.box input {
    width: 100%;
    padding: 14px 18px;
    margin-bottom: 0.5rem;
    border: 1px solid #d0e2c0;
    border-radius: 48px;
    font-size: 1rem;
    font-family: inherit;
    background: #fefef7;
    transition: all 0.2s;
}

.box input:focus {
    outline: none;
    border-color: #2e7d32;
    box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
    background: white;
}

.box input::placeholder {
    color: #9bbf8f;
    font-weight: 400;
}

/* Error messages */
.error {
    color: #c62828;
    font-size: 0.75rem;
    margin: -0.3rem 0 0.8rem 1rem;
    font-weight: 500;
    display: block;
    animation: shake 0.2s ease-in-out 0s 2;
}

/* Submit button */
.box button {
    width: 100%;
    background: linear-gradient(135deg, #2e7d32, #1b5e20);
    border: none;
    color: white;
    padding: 14px 20px;
    border-radius: 48px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 0.5rem;
    font-family: inherit;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
    position: relative;
    overflow: hidden;
}

.box button::before {
    content: "🌱";
    position: absolute;
    left: -30px;
    opacity: 0;
    transition: all 0.3s;
    font-size: 1.2rem;
}

.box button:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #1b5e20, #0f3b0f);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

.box button:hover::before {
    left: 20px;
    opacity: 1;
}

/* Server error (global) */
#serverError {
    text-align: center;
    margin-top: 1rem;
    padding: 8px;
    border-radius: 40px;
    background: #ffefef;
    color: #c62828;
    font-size: 0.85rem;
}

/* ----- ANIMATIONS ----- */
@keyframes fadeSlideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
}

/* ----- RESPONSIVE (mobile) ----- */
@media (max-width: 520px) {
    body {
        padding: 1rem;
    }

    .box {
        padding: 1.8rem 1.2rem;
        border-radius: 32px;
    }

    .box h2 {
        font-size: 1.6rem;
    }

    .box input {
        padding: 12px 16px;
    }

    .box button {
        padding: 12px 16px;
    }

    body::before,
    body::after {
        font-size: 2rem;
        opacity: 0.08;
    }
}

/* Optional: remove extra whitespace */
.error:empty {
    display: none;
}
    </style>

 
    <title>Login</title>

    
</head>
<body>

<div class="box">
    <h2>Login</h2>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email">
        <div id="emailError" class="error"></div>

        <input type="password" id="password" placeholder="Password">
        <div id="passwordError" class="error"></div>

        <button type="submit">Login</button>
    </form>

    <div id="serverError" class="error"></div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    let email = document.getElementById('email').value.trim();
    let password = document.getElementById('password').value.trim();

    let valid = true;

    // reset errors
    document.getElementById('emailError').innerText = "";
    document.getElementById('passwordError').innerText = "";
    document.getElementById('serverError').innerText = "";

    // validation
    if (email === "") {
        document.getElementById('emailError').innerText = "Email required";
        valid = false;
    }

    if (password === "") {
        document.getElementById('passwordError').innerText = "Password required";
        valid = false;
    }

    if (!valid) return;

    try {
        const response = await fetch("http://127.0.0.1:8000/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
            document.getElementById('serverError').innerText = data.error || "Login failed";
            return;
        }

        // save token + role
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("role", data.user.role);

        const role = data.user.role;

        // redirect
        if (role === "Admin") {
            window.location.href = "Admin/Html/Admin Dashboard.html";
        } 
        else if (role === "Staff") {
            window.location.href = "Staff/Html/Staff Dashboard.html";
        } 
        else {
            alert("Unknown role");
        }

    } catch (error) {
        document.getElementById('serverError').innerText = "Server error";
    }
});
</script>

</body>
</html>
