<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================
   VIBRANT & FRESH LOGIN STYLES
   Primary Lime: #6CC551 | Radial Gradient Background
   Glassmorphism card | Pill button | Modern Geometric
   ============================================ */

/* ---------- IMPORT GOOGLE FONTS ---------- */
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Outfit:wght@300;400;500;600;700;800&display=swap');

/* ---------- CSS VARIABLES ---------- */
:root {
  --lime-green: #6CC551;
  --lime-glow: rgba(108, 197, 81, 0.3);
  --gradient-bg: radial-gradient(circle at top right, #D4EFDF, #ffffff);
  --text-heading: #1A1A1A;
  --text-body: #707070;
  --error-red: #E53E3E;
  --card-bg: #F8FDF9;
  --glass-bg: rgba(255, 255, 255, 0.92);
  --glass-border: 1px solid rgba(255, 255, 255, 0.7);
  --shadow-green: 0px 10px 20px rgba(108, 197, 81, 0.25);
  --shadow-hover: 0px 15px 25px rgba(108, 197, 81, 0.3);
  --radius-pill: 50px;
  --radius-card: 28px;
  --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

/* ---------- GLOBAL RESET ---------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', 'Outfit', system-ui, -apple-system, sans-serif;
  background: var(--gradient-bg);
  color: var(--text-body);
  line-height: 1.5;
  font-size: 16px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  margin: 0;
}

/* ---------- LOGIN CARD (Glassmorphism + rounded corners) ---------- */
.box {
  max-width: 460px;
  width: 100%;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  border: var(--glass-border);
  border-radius: var(--radius-card);
  padding: 2.5rem 2rem 2.8rem;
  box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08), var(--shadow-green);
  transition: var(--transition);
}

.box:hover {
  transform: translateY(-5px);
  box-shadow: 0 25px 45px -12px rgba(108, 197, 81, 0.35);
}

/* ---------- HEADING (Geometric Bold) ---------- */
.box h2 {
  font-family: 'Outfit', 'Inter', sans-serif;
  font-weight: 800;
  font-size: 2.2rem;
  letter-spacing: -0.03em;
  color: var(--text-heading);
  text-align: center;
  margin-bottom: 2rem;
  position: relative;
}

/* decorative green underline */
.box h2::after {
  content: '';
  display: block;
  width: 60px;
  height: 3px;
  background: var(--lime-green);
  border-radius: 10px;
  margin: 0.75rem auto 0;
}

/* ---------- FORM INPUTS (Pill shape + modern) ---------- */
#loginForm input {
  width: 100%;
  padding: 14px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-heading);
  background: white;
  border: 1.5px solid #e2e8e2;
  border-radius: var(--radius-pill);
  transition: var(--transition);
  outline: none;
}

#loginForm input:focus {
  border-color: var(--lime-green);
  box-shadow: 0 0 0 3px rgba(108, 197, 81, 0.2);
}

#loginForm input::placeholder {
  color: #b0c0b0;
  font-weight: 400;
}

/* spacing between fields */
#email {
  margin-bottom: 0;
}

#password {
  margin-top: 6px;
}

/* ---------- ERROR MESSAGES (Accent Red) ---------- */
.error {
  color: var(--error-red);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.3px;
  margin-top: 6px;
  margin-bottom: 14px;
  padding-left: 16px;
  font-family: 'Inter', monospace;
}

#emailError, #passwordError {
  min-height: 1.6rem;
}

#serverError {
  text-align: center;
  background: rgba(229, 62, 62, 0.08);
  border-radius: 50px;
  padding: 10px 16px;
  margin-top: 20px;
  font-weight: 500;
  font-size: 0.8rem;
  border-left: 3px solid var(--error-red);
}

/* ---------- LOGIN BUTTON (Pill + Green Glow) ---------- */
button[type="submit"] {
  background: var(--lime-green);
  color: white;
  border: none;
  width: 100%;
  padding: 14px 24px;
  font-family: 'Outfit', 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: var(--transition);
  box-shadow: var(--shadow-green);
  margin-top: 12px;
}

button[type="submit"]:hover {
  background: #5bb545;
  transform: translateY(-3px);
  box-shadow: var(--shadow-hover);
}

button[type="submit"]:active {
  transform: translateY(1px);
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 520px) {
  body {
    padding: 1rem;
  }
  .box {
    padding: 1.8rem 1.5rem 2rem;
  }
  .box h2 {
    font-size: 1.8rem;
  }
  #loginForm input {
    padding: 12px 18px;
    font-size: 0.9rem;
  }
  button[type="submit"] {
    padding: 12px 20px;
    font-size: 0.9rem;
  }
}

/* ---------- ACCESSIBILITY & UTILITY ---------- */
button[type="submit"]:focus-visible,
#loginForm input:focus-visible {
  outline: 2px solid var(--lime-green);
  outline-offset: 2px;
}

/* subtle animation for error appearance */
.error {
  transition: opacity 0.15s ease;
}
    </style>

 
    <title>Login</title>

    
</head>
<body>

<div class="box">
    <h2>Login</h2>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email">
        <div id="emailError" class="error"></div>

        <input type="password" id="password" placeholder="Password">
        <div id="passwordError" class="error"></div>

        <button type="submit">Login</button>
    </form>

    <div id="serverError" class="error"></div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    let email = document.getElementById('email').value.trim();
    let password = document.getElementById('password').value.trim();

    let valid = true;

    // reset errors
    document.getElementById('emailError').innerText = "";
    document.getElementById('passwordError').innerText = "";
    document.getElementById('serverError').innerText = "";

    // validation
    if (email === "") {
        document.getElementById('emailError').innerText = "Email required";
        valid = false;
    }

    if (password === "") {
        document.getElementById('passwordError').innerText = "Password required";
        valid = false;
    }

    if (!valid) return;

    try {
        const response = await fetch("http://127.0.0.1:8000/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
            document.getElementById('serverError').innerText = data.error || "Login failed";
            return;
        }

        // save token + role
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("role", data.user.role);

        const role = data.user.role;

        // redirect
        if (role === "Admin") {
            window.location.href = "Admin/Html/Admin Dashboard.html";
        } 
        else if (role === "Staff") {
            window.location.href = "Staff/Html/Staff Dashboard.html";
        } 
        else {
            alert("Unknown role");
        }

    } catch (error) {
        document.getElementById('serverError').innerText = "Server error";
    }
});
</script>

</body>
</html>
